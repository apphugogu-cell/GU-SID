<!DOCTYPE html>
<html lang="es" class="bg-gray-50 scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GU Medidores 2 - Herramientas Internas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    /* SPLASH SCREEN */
    .splash-screen {
      position: fixed;
      inset: 0;
      background-color: #0a0a0f;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    .logo-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 25px;
    }

    .logo-glow {
      position: absolute;
      inset: -25px;
      background: rgba(59, 130, 246, 0.25);
      filter: blur(35px);
      border-radius: 50%;
    }

    .tool-item {
      transition: all 0.25s ease;
    }
    .tool-item:hover {
      background-color: #f8fafc;
    }
    .tool-item.active {
      background-color: #f0f9ff;
      border-left: 5px solid #2563eb;
    }

    .uralmo-title {
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(to right, #f8fafc, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col antialiased overflow-hidden">

  <!-- SPLASH SCREEN (2.5 segundos) -->
  <div id="splash-screen" class="splash-screen">
    <div class="text-center">
      <div class="flex justify-center">
        <div class="logo-container">
          <div class="logo-glow"></div>
          <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" 
               class="logo-img w-full h-full object-cover rounded-3xl border-4 border-blue-500 shadow-2xl" alt="Logo Uralmo">
        </div>
      </div>
      <h1 class="uralmo-title">GRUPO URALMO</h1>
      <p class="text-blue-400 text-sm tracking-[3px] mt-2 font-medium">INTELIGENCIA DOCUMENTAL</p>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div id="main-content" class="hidden flex-col min-h-screen">

    <!-- HEADER con estilo del logo -->
    <header class="bg-slate-950 border-b border-slate-800">
      <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" 
               alt="Logo" class="w-11 h-11 rounded-2xl">
          <div>
            <h1 class="uralmo-title text-3xl">GRUPO URALMO</h1>
            <p class="text-xs text-slate-400 tracking-widest">MEDIDORES 2 • HERRAMIENTAS INTERNAS</p>
          </div>
        </div>
        <div class="text-right">
          <p class="text-sm text-slate-400">Laredo, La Libertad • Perú</p>
        </div>
      </div>
    </header>

    <div class="flex flex-1 max-w-7xl mx-auto w-full px-6 py-8 gap-8">

      <!-- PANEL IZQUIERDO - MENÚ -->
      <aside class="w-full lg:w-96 bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden flex flex-col">
        <div class="px-7 py-6 border-b bg-slate-50">
          <h2 class="text-xl font-bold text-slate-800">Módulos Disponibles</h2>
        </div>
        <div id="tools-list" class="flex-1 overflow-y-auto divide-y divide-slate-100"></div>
      </aside>

      <!-- PANEL DERECHO - DETALLE -->
      <main class="flex-1 bg-white rounded-3xl shadow-xl border border-slate-200 p-10">
        <div id="tool-detail" class="min-h-full"></div>
      </main>

    </div>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-sm mt-auto">
      © 2026 Grupo Uralmo • Laredo, La Libertad, Perú • Sistemas de Inteligencia Documental
    </footer>
  </div>

  <script>
    const tools = [
      { id: 1, title: "Renombrado masivo de archivos fotográficos (Med2)", tag: "Procesamiento de imágenes • Organización",
        desc: "<p class='mb-4 text-slate-700'>Estandarización de nombres, eliminación de duplicados y corrección de orientación en imágenes de medidores.</p><div class='font-semibold text-sm mt-6 mb-2 text-slate-600'>Funcionalidades principales:</div><ul class='list-disc pl-5 space-y-1.5 text-sm text-slate-600'><li>Patrones automáticos: prefijo + correlativo + fecha</li><li>Eliminación selectiva por nombre/tamaño/hash</li><li>Rotación batch (EXIF o manual)</li><li>Previsualización y reversión</li></ul>" },
      { id: 2, title: "Eliminación masiva de archivos", tag: "Limpieza • Mantenimiento",
        desc: "<p class='mb-4 text-slate-700'>Purgado seguro de carpetas con alto volumen de archivos temporales o duplicados.</p><ul class='list-disc pl-5 mt-3 space-y-1.5 text-sm text-slate-600'><li>Filtros por extensión, fecha y tamaño</li><li>Modo dry-run (simulación)</li><li>Registro completo de operaciones</li></ul>" },
      { id: 3, title: "Recorte automático de imágenes escaneadas", tag: "Post-procesamiento • Digitalización",
        desc: "<p class='mb-4 text-slate-700'>Extracción inteligente del área útil en escaneos A4/carta.</p><ul class='list-disc pl-5 mt-3 space-y-1.5 text-sm text-slate-600'><li>Detección automática de bordes</li><li>Corrección básica de perspectiva</li><li>Optimización para almacenamiento</li></ul>" },
      { id: 4, title: "Rotación masiva de imágenes", tag: "Procesamiento batch • Corrección",
        desc: "<p class='mb-4 text-slate-700'>Corrección de orientación en lotes grandes de fotografías.</p><ul class='list-disc pl-5 mt-3 space-y-1.5 text-sm text-slate-600'><li>90°/180°/270° manual o según EXIF</li><li>Filtrado por orientación actual</li><li>Procesamiento por carpeta</li></ul>" },
      { id: 5, title: "Consulta geográfica por número de suministro", tag: "Georreferenciación • Verificación",
        desc: "<p class='mb-4 text-slate-700'>Localización rápida de punto de suministro en mapa interactivo.</p><ul class='list-disc pl-5 mt-3 space-y-1.5 text-sm text-slate-600'><li>Búsqueda por código</li><li>Visualización + datos asociados</li><li>Exportación de coordenadas</li></ul>" },
      { id: 6, title: "Generador de panel fotográfico técnico", tag: "Reporte • Documentación",
        desc: "<p class='mb-4 text-slate-700'>Creación estructurada de láminas fotográficas para informes técnicos.</p><ul class='list-disc pl-5 mt-3 space-y-1.5 text-sm text-slate-600'><li>Título, descripción y fecha por imagen</li><li>Plantillas predefinidas (2×2, 2×4)</li><li>Exportación PDF / PNG alta resolución</li></ul>" }
    ];

    function hideSplash() {
      const splash = document.getElementById('splash-screen');
      const main = document.getElementById('main-content');
      splash.style.opacity = '0';
      setTimeout(() => {
        splash.style.display = 'none';
        main.classList.remove('hidden');
        main.classList.add('flex');
        initializeTools();
      }, 800);
    }

    function initializeTools() {
      const listContainer = document.getElementById('tools-list');
      const detailContainer = document.getElementById('tool-detail');

      tools.forEach((tool, index) => {
        const item = document.createElement('div');
        item.className = `tool-item px-7 py-5 cursor-pointer border-l-4 border-transparent ${index === 0 ? 'active' : ''}`;
        item.innerHTML = `
          <div class="flex gap-4">
            <div class="w-9 h-9 bg-blue-100 text-blue-700 rounded-2xl flex items-center justify-center font-bold text-lg flex-shrink-0">
              ${tool.id.toString().padStart(2, '0')}
            </div>
            <div class="flex-1">
              <div class="font-semibold text-slate-800 text-[15.5px] leading-tight">${tool.title}</div>
              <div class="text-xs text-slate-500 mt-2">${tool.tag}</div>
            </div>
          </div>
        `;
        listContainer.appendChild(item);

        item.addEventListener('click', () => {
          document.querySelectorAll('.tool-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          detailContainer.innerHTML = `
            <h2 class="text-3xl font-bold text-slate-800 mb-8">${tool.title}</h2>
            <div class="prose prose-slate text-slate-700 leading-relaxed">
              ${tool.desc}
            </div>
            <div class="mt-14">
              <a href="app${tool.id}/index.html" 
                 class="inline-flex items-center gap-3 bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-semibold text-lg transition-all">
                Ejecutar módulo 
                <span class="text-2xl">→</span>
              </a>
            </div>
          `;
        });
      });

      // Cargar primera herramienta
      listContainer.querySelector('.tool-item').click();
    }

    // Iniciar con 2.5 segundos
    setTimeout(hideSplash, 2500);
    lucide.createIcons();
  </script>
</body>
</html>
