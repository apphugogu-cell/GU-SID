<!DOCTYPE html>
<html lang="es" class="bg-gray-50 scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GU Medidores 2 - Herramientas Internas</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .splash-screen {
            background-color: #0a0a0f;
            transition: opacity 0.8s ease-out;
        }
        .tool-item.active {
            background-color: #eff6ff;
            border-left-color: #2563eb;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .loader-bar {
            animation: load 3s ease-in-out forwards;
        }
        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <!-- SPLASH SCREEN -->
    <div id="splash" class="fixed inset-0 z-[100] splash-screen flex flex-col items-center justify-center overflow-hidden">
        <div class="relative flex flex-col items-center max-w-md w-full px-6 text-center">
            <div class="relative w-32 h-32 mb-8">
                <div class="absolute inset-0 bg-blue-500/20 blur-2xl rounded-full animate-pulse"></div>
                <div class="relative w-full h-full rounded-3xl overflow-hidden border-2 border-blue-500/30 shadow-[0_0_40px_rgba(59,130,246,0.3)] bg-[#1a1a25]">
                    <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" class="w-full h-full object-cover" alt="Logo">
                </div>
            </div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter italic mb-2">
                <span class="text-white">GRUPO</span>
                <span class="text-blue-500 ml-2">URALMO</span>
            </h1>
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="h-[1px] w-8 bg-blue-500/50"></div>
                <span class="text-[10px] md:text-xs tracking-[0.3em] text-slate-400 font-bold uppercase">Sistemas de Inteligencia Documental</span>
                <div class="h-[1px] w-8 bg-blue-500/50"></div>
            </div>
            <div class="flex flex-col items-center">
                <div class="flex items-center gap-2 text-blue-500/80 mb-4">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                    <span class="text-[10px] font-medium uppercase tracking-widest">Iniciando sesión segura</span>
                </div>
                <div class="w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-500 loader-bar shadow-[0_0_10px_rgba(59,130,246,0.8)]"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden initially) -->
    <div id="dashboard" class="hidden flex-col min-h-screen">
        <header class="sticky top-0 z-50 w-full shadow-lg">
            <div class="relative w-full h-32 sm:h-40 md:h-48 bg-black overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-gray-950 via-blue-950 to-gray-900 opacity-95"></div>
                <div class="container mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center relative z-10">
                    <div class="flex-shrink-0 w-20 h-20 sm:w-24 sm:h-24 rounded-full overflow-hidden border-4 border-blue-500 shadow-2xl mr-5 sm:mr-8 bg-white">
                        <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" class="w-full h-full object-cover" alt="Logo">
                    </div>
                    <div class="flex-1">
                        <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white tracking-tight leading-tight">GRUPO <span class="text-blue-400">URALMO</span></h1>
                        <p class="text-sm sm:text-base md:text-lg text-blue-300 font-medium mt-1">SISTEMAS DE INTELIGENCIA DOCUMENTAL</p>
                        <p class="text-xs sm:text-sm text-gray-400 mt-2">Medidores 2 • Herramientas Operativas • Laredo, La Libertad</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 flex-grow">
            <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 max-w-7xl mx-auto">
                <!-- Sidebar -->
                <aside class="w-full lg:w-80 xl:w-96 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-fit">
                    <div class="px-5 py-4 border-b bg-slate-50/50">
                        <h2 class="text-base font-semibold text-slate-800">Módulos disponibles</h2>
                    </div>
                    <div id="tool-list" class="divide-y divide-slate-100">
                        <!-- Items populated by JS -->
                    </div>
                </aside>

                <!-- Detail Panel -->
                <section class="w-full lg:flex-1 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px]">
                    <div id="tool-content" class="p-6 lg:p-10 fade-in">
                        <!-- Content populated by JS -->
                    </div>
                </section>
            </div>
        </main>

        <footer class="bg-slate-900 text-slate-400 py-8 mt-auto border-t border-slate-800">
            <div class="container mx-auto px-6 text-center">
                <p class="text-sm">© 2026 Grupo Uralmo • Laredo, La Libertad, Perú</p>
            </div>
        </footer>
    </div>

    <script>
        const tools = [
            { id: 1, icon: 'camera', title: "Renombrado masivo de archivos fotográficos (Med2)", tag: "Procesamiento de imágenes", desc: "Estandarización de nombres, eliminación de duplicados y corrección de orientación en imágenes de medidores y levantamientos.", features: ["Patrones automáticos", "Eliminación por hash", "Rotación batch", "Previsualización"] },
            { id: 2, icon: 'trash-2', title: "Eliminación masiva de archivos", tag: "Limpieza • Mantenimiento", desc: "Purgado seguro de carpetas con alto volumen de archivos temporales o duplicados (>10.000 ítems).", features: ["Filtros por extensión", "Modo dry-run", "Registro de operaciones"] },
            { id: 3, icon: 'crop', title: "Recorte automático de imágenes", tag: "Digitalización", desc: "Extracción inteligente del área útil en escaneos A4/carta (medidores, planos, reportes).", features: ["Detección de bordes", "Corrección perspectiva", "Optimización"] },
            { id: 4, icon: 'rotate-cw', title: "Rotación masiva de imágenes", tag: "Procesamiento batch", desc: "Corrección de orientación en lotes grandes de fotografías.", features: ["90°/180°/270°", "Filtro EXIF", "Procesamiento por carpeta"] },
            { id: 5, icon: 'map-pin', title: "Consulta geográfica", tag: "Georreferenciación", desc: "Localización rápida de punto de suministro en mapa interactivo.", features: ["Búsqueda por código", "Visualización datos", "Exportación coordenadas"] },
            { id: 6, icon: 'file-text', title: "Generador de panel fotográfico", tag: "Reporte • Documentación", desc: "Creación estructurada de láminas fotográficas para informes técnicos.", features: ["Títulos y fechas", "Plantillas PDF", "Alta resolución"] }
        ];

        function renderTool(tool) {
            const content = document.getElementById('tool-content');
            content.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                    <div>
                        <span class="inline-block px-3 py-1 bg-blue-100 text-blue-700 text-xs font-semibold rounded-full mb-3">${tool.tag}</span>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">${tool.title}</h2>
                    </div>
                    <div class="flex-shrink-0 w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 border border-slate-100">
                        <i data-lucide="${tool.icon}" class="w-8 h-8"></i>
                    </div>
                </div>
                <p class="text-lg text-slate-600 leading-relaxed mb-8">${tool.desc}</p>
                <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                    <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4 flex items-center gap-2">Funcionalidades principales</h3>
                    <ul class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${tool.features.map(f => `<li class="flex items-start gap-3 text-slate-600 text-sm"><div class="mt-1.5 w-1.5 h-1.5 rounded-full bg-blue-500 flex-shrink-0"></div>${f}</li>`).join('')}
                    </ul>
                </div>
                <div class="mt-12 pt-8 border-t border-slate-100 flex justify-end">
                    <button class="inline-flex items-center px-6 py-3 bg-slate-900 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-all shadow-md">Ejecutar módulo</button>
                </div>
            `;
            lucide.createIcons();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            const list = document.getElementById('tool-list');
            tools.forEach((tool, idx) => {
                const btn = document.createElement('button');
                btn.className = `tool-item w-full text-left px-5 py-4 transition-all border-l-4 ${idx === 0 ? 'active' : 'border-transparent hover:bg-slate-50'}`;
                btn.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center bg-slate-100 text-slate-500">
                            <i data-lucide="${tool.icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-medium text-[15px] leading-tight text-slate-800">${tool.title}</div>
                            <div class="mt-1 text-xs text-slate-500 truncate">${tool.tag}</div>
                        </div>
                    </div>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.tool-item').forEach(b => b.classList.remove('active', 'bg-blue-50/50', 'border-blue-600'));
                    btn.classList.add('active', 'bg-blue-50/50', 'border-blue-600');
                    renderTool(tool);
                };
                list.appendChild(btn);
            });

            renderTool(tools[0]);

            // Splash transition
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('dashboard').classList.add('flex');
                }, 800);
            }, 3500);
        });
    </script>
</body>
</html>
