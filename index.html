<!DOCTYPE html>
<html lang="es" class="bg-slate-50 scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grupo Uralmo - Medidores 2 | Panel Operativo</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --accent: #3b82f6;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      -webkit-font-smoothing: antialiased;
    }

    /* MARCO METÁLICO CROMADO PREMIUM (ESTILO SQUIRCLE) */
    .chrome-frame {
      position: relative;
      padding: 6px;
      background: linear-gradient(135deg, 
        #ffffff 0%, 
        #dcdcdc 15%, 
        #808080 35%, 
        #f0f0f0 50%, 
        #666666 65%, 
        #a0a0a0 85%, 
        #333333 100%);
      border-radius: 32px;
      box-shadow: 
        0 12px 25px rgba(0,0,0,0.4),
        inset 0 1px 2px rgba(255,255,255,0.9),
        inset 0 -1px 2px rgba(0,0,0,0.3);
      display: inline-block;
    }

    .chrome-frame img {
      border-radius: 26px;
      border: 2px solid #000;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* SPLASH SCREEN (100% SIZE) */
    .splash-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Transición más rápida */
      font-size: 16px; 
    }

    .logo-container {
      position: relative;
      width: 150px;
      height: 150px;
      margin-bottom: 2rem;
    }

    .logo-glow {
      position: absolute;
      inset: -25px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.3) 0%, transparent 70%);
      filter: blur(25px);
      animation: pulse-glow 2s infinite ease-in-out;
    }

    /* PANEL OPERATIVO (REDUCCIÓN GENERAL AL 80%) */
    #main-content {
      font-size: 13px;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* BOTONES DEL MENÚ ULTRA-COMPACTOS */
    .tool-item {
      padding: 4px 12px !important;
      border-radius: 8px !important;
      margin-bottom: 2px;
      min-height: 36px;
    }

    .tool-item.active {
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      border-left: 4px solid var(--primary);
      transform: translateX(2px);
    }

    .icon-box {
      width: 24px !important;
      height: 24px !important;
      border-radius: 6px !important;
    }

    .icon-box i {
      width: 14px !important;
      height: 14px !important;
    }

    .detail-card {
      animation: slide-up 0.3s ease-out forwards;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col overflow-hidden">

  <!-- ====================== SPLASH SCREEN (1.5 SEGUNDOS TOTAL) ====================== -->
  <div id="splash-screen" class="splash-screen">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <div class="chrome-frame w-full h-full">
        <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" alt="Logo Grupo Uralmo">
      </div>
    </div>

    <div class="text-center space-y-4">
      <h1 class="text-5xl md:text-6xl font-black tracking-tighter text-white">
        GRUPO <span class="text-blue-500">URALMO</span>
      </h1>
      <p class="text-slate-400 font-semibold tracking-[0.5em] uppercase text-sm">Sistemas de Inteligencia Documental</p>
      
      <div class="pt-12">
        <div class="flex items-center justify-center gap-3 text-blue-400 text-xs font-bold tracking-widest uppercase mb-4">
          <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
          INICIANDO SISTEMA
        </div>
        <div class="w-72 h-1 bg-slate-800 rounded-full mx-auto overflow-hidden">
          <!-- Barra de carga en 1.1 segundos -->
          <div id="loader-bar" class="h-full bg-blue-500 w-0 transition-all duration-[1100ms] ease-in-out"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ====================== CONTENIDO PRINCIPAL ====================== -->
  <div id="main-content" class="hidden flex-col min-h-screen opacity-0 transition-opacity duration-500">

    <!-- Header Compacto -->
    <header class="w-full bg-slate-950 border-b border-slate-800 sticky top-0 z-40">
      <div class="container mx-auto px-6 py-2 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="chrome-frame !p-1 !rounded-xl shadow-none">
            <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" 
                 alt="Logo" class="!w-9 !h-9 !rounded-lg">
          </div>
          <div>
            <h1 class="text-xl font-bold text-white tracking-tight leading-none">GRUPO URALMO</h1>
            <div class="flex items-center gap-2 text-[10px] uppercase tracking-widest font-bold text-blue-400 mt-1">
              <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
              Sistemas Medidores 2
            </div>
          </div>
        </div>
        
        <div class="hidden md:flex items-center gap-6 text-slate-400 text-[11px] font-medium uppercase tracking-wider">
          <div class="flex items-center gap-2">
            <i data-lucide="map-pin" class="w-4 h-4"></i>
            Laredo, La Libertad
          </div>
          <div id="current-date" class="font-mono opacity-60"></div>
        </div>
      </div>
    </header>

    <!-- Dashboard Layout -->
    <main class="flex-1 container mx-auto px-4 lg:px-8 py-4 overflow-hidden">
      <div class="flex flex-col lg:flex-row gap-6 h-full max-w-7xl mx-auto">

        <!-- Sidebar -->
        <aside class="w-full lg:w-[300px] flex flex-col gap-4">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            <div class="px-5 py-2.5 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
              <h2 class="text-[11px] font-bold text-slate-800 uppercase tracking-wider">Módulos de Control</h2>
              <i data-lucide="layout-grid" class="w-4 h-4 text-slate-400"></i>
            </div>
            
            <div id="tools-list" class="flex-1 overflow-y-auto p-2 space-y-0.5 max-h-[60vh] lg:max-h-[calc(100vh-200px)]">
              <!-- JS Inyecta aquí -->
            </div>
          </div>
        </aside>

        <!-- Detalle -->
        <section class="flex-1 flex flex-col">
          <div id="tool-detail" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 lg:p-10 h-full min-h-[450px]">
            <!-- JS Inyecta aquí -->
          </div>
        </section>

      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-3 px-8">
      <div class="container mx-auto flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
        <p>© 2026 Grupo Uralmo - Inteligencia Documental</p>
        <div class="flex gap-6">
          <span class="flex items-center gap-1.5"><i data-lucide="check-circle-2" class="w-3.5 h-3.5 text-green-500"></i> Activo</span>
          <span class="flex items-center gap-1.5"><i data-lucide="lock" class="w-3.5 h-3.5 text-blue-500"></i> SSL</span>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const tools = [
      {
        id: 1,
        title: "Renombrado Masivo Fotográfico",
        tag: "Procesamiento • Med2",
        icon: "camera",
        desc: "Estandarización de nombres de archivos mediante patrones inteligentes. Ideal para organizar levantamientos de medidores y auditorías de campo.",
        features: [
          "Patrones dinámicos: Prefijo + Correlativo + Fecha",
          "Detección y limpieza de duplicados por Hash",
          "Corrección automática de orientación EXIF",
          "Previsualización de cambios antes de aplicar"
        ]
      },
      {
        id: 2,
        title: "Purgado Masivo de Archivos",
        tag: "Mantenimiento • Limpieza",
        icon: "trash-2",
        desc: "Herramienta de limpieza profunda para directorios con alto volumen de datos. Elimina archivos temporales o residuales de forma segura.",
        features: [
          "Filtros avanzados por extensión y peso",
          "Modo Simulación (Dry-run) sin riesgo",
          "Reporte detallado de archivos eliminados",
          "Soporte para rutas de red y locales"
        ]
      },
      {
        id: 3,
        title: "Recorte Inteligente de Escaneos",
        tag: "Digitalización • OCR",
        icon: "crop",
        desc: "Algoritmo de detección de bordes para extraer automáticamente el área útil de documentos escaneados como planos o reportes A4.",
        features: [
          "Auto-detección de márgenes y bordes",
          "Corrección de perspectiva (Deskew)",
          "Optimización de peso para carga en nube",
          "Procesamiento paralelo de alto rendimiento"
        ]
      },
      {
        id: 4,
        title: "Rotación Batch de Imágenes",
        tag: "Post-procesamiento",
        icon: "rotate-cw",
        desc: "Corrige la orientación de miles de imágenes simultáneamente sin pérdida de calidad (Lossless rotation).",
        features: [
          "Rotación ortogonal (90°, 180°, 270°)",
          "Filtrado por metadatos de orientación",
          "Preservación de fechas de creación",
          "Interfaz de selección por carpetas"
        ]
      },
      {
        id: 5,
        title: "Consulta Geográfica de Suministro",
        tag: "GIS • Verificación",
        icon: "map",
        desc: "Visualización inmediata de la ubicación de suministros eléctricos sobre cartografía digital actualizada.",
        features: [
          "Búsqueda instantánea por código",
          "Capa de catastro integrada",
          "Exportación de coordenadas UTM/WGS84",
          "Historial de consultas recientes"
        ]
      },
      {
        id: 6,
        title: "Generador de Paneles Técnicos",
        tag: "Documentación • PDF",
        icon: "file-text",
        desc: "Automatiza la creación de informes fotográficos estructurados para sustentos técnicos y auditorías.",
        features: [
          "Plantillas configurables (2x2, 2x4, 3x3)",
          "Incrustación de marcas de agua y fechas",
          "Generación directa en PDF de alta calidad",
          "Editor de pies de foto masivo"
        ]
      }
    ];

    function hideSplash() {
      const splash = document.getElementById('splash-screen');
      const mainContent = document.getElementById('main-content');
      const loaderBar = document.getElementById('loader-bar');

      // Inicia carga de barra
      loaderBar.style.width = '100%';

      // Espera a que termine la barra (1.1s) y luego inicia el fade out
      setTimeout(() => {
        splash.style.opacity = '0';
        splash.style.transform = 'scale(1.05)';
        
        // Espera al fade out (0.4s) para mostrar el contenido
        setTimeout(() => {
          splash.style.display = 'none';
          mainContent.classList.remove('hidden');
          setTimeout(() => {
            mainContent.classList.remove('opacity-0');
            document.body.style.overflow = 'auto';
            initializeTools();
          }, 50);
        }, 400);
      }, 1100);
    }

    function initializeTools() {
      const listContainer = document.getElementById('tools-list');
      const detailContainer = document.getElementById('tool-detail');

      tools.forEach((tool, index) => {
        const item = document.createElement('div');
        item.className = `tool-item group flex items-center gap-3 border border-transparent transition-all cursor-pointer ${index === 0 ? 'active' : ''}`;
        
        item.innerHTML = `
          <div class="icon-box bg-slate-100 text-slate-500 group-hover:bg-blue-50 group-hover:text-blue-600 flex items-center justify-center transition-colors flex-shrink-0">
            <i data-lucide="${tool.icon}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="text-[11px] font-bold text-slate-800 truncate uppercase tracking-tight leading-tight">${tool.title}</h3>
            <p class="text-[10px] text-slate-400 font-medium mt-0.5">${tool.tag}</p>
          </div>
        `;

        listContainer.appendChild(item);

        item.addEventListener('click', () => {
          document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');

          detailContainer.innerHTML = `
            <div class="detail-card flex flex-col h-full">
              <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-5">
                  <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                    <i data-lucide="${tool.icon}" class="w-7 h-7"></i>
                  </div>
                  <div>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-1 block">${tool.tag}</span>
                    <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">${tool.title}</h2>
                  </div>
                </div>
                <div class="px-4 py-2 bg-slate-100 rounded-xl text-[10px] font-bold text-slate-500 uppercase tracking-widest border border-slate-200">
                  ID: 00${tool.id}
                </div>
              </div>

              <div class="grid lg:grid-cols-5 gap-10 flex-1">
                <div class="lg:col-span-3 space-y-8">
                  <div>
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Descripción del Sistema</h4>
                    <p class="text-slate-600 text-lg leading-relaxed font-medium">${tool.desc}</p>
                  </div>
                  
                  <div class="flex gap-3">
                    <span class="px-3 py-1 bg-green-50 text-green-600 text-[10px] font-bold rounded border border-green-100">ESTABLE</span>
                    <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold rounded border border-blue-100">V. 2.4.0</span>
                  </div>
                </div>

                <div class="lg:col-span-2">
                  <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                    <h4 class="text-[10px] font-bold text-slate-800 uppercase tracking-widest mb-6 flex items-center gap-2">
                      <i data-lucide="list-checks" class="w-4 h-4 text-blue-600"></i>
                      Capacidades
                    </h4>
                    <ul class="space-y-4">
                      ${tool.features.map(f => `
                        <li class="flex items-start gap-3 text-slate-600 text-[12px] font-medium">
                          <i data-lucide="check" class="w-4 h-4 text-blue-500 mt-0.5 flex-shrink-0"></i>
                          ${f}
                        </li>
                      `).join('')}
                    </ul>
                  </div>
                </div>
              </div>

              <div class="mt-10 pt-8 border-t border-slate-100">
                <a href="app${tool.id}/index.html" 
                   class="group inline-flex items-center gap-4 px-10 py-4 bg-slate-950 hover:bg-blue-600 text-white text-sm font-bold rounded-2xl transition-all duration-300 shadow-xl hover:shadow-blue-500/25">
                  INICIAR MÓDULO OPERATIVO
                  <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                </a>
              </div>
            </div>
          `;
          lucide.createIcons();
        });
      });

      if (tools.length > 0) {
        listContainer.querySelector('.tool-item').click();
      }
    }

    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', options);

    // Inicia proceso de splash tras 100ms
    setTimeout(hideSplash, 100);
    lucide.createIcons();
  </script>
</body>
</html>
