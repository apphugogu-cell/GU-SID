<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUPO URALMO | Acceso</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0f;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 30px;
        }

        .logo-glow {
            position: absolute;
            inset: -10px;
            background: rgba(59, 130, 246, 0.2);
            filter: blur(20px);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .logo-img {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            background: #1a1a25;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
            font-style: italic;
        }

        .brand-uralmo { color: #3b82f6; }

        .subtitle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .line {
            height: 1px;
            width: 30px;
            background: rgba(59, 130, 246, 0.5);
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
        }

        .loader-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-text {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(59, 130, 246, 0.8);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .loader-bg {
            width: 200px;
            height: 4px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
            animation: loading 3.5s ease-in-out forwards;
        }

        .fade-out {
            animation: fadeOut 0.8s forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div id="splash-screen" class="text-center">
        <div class="flex justify-center">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" 
                     class="logo-img" alt="Logo Uralmo">
            </div>
        </div>

        <h1>GRUPO <span class="brand-uralmo">URALMO</span></h1>
        
        <div class="subtitle-container">
            <div class="line"></div>
            <div class="subtitle">Sistemas de Inteligencia Documental</div>
            <div class="line"></div>
        </div>

        <div class="loader-container">
            <div class="status-text">
                <i data-lucide="loader-2" style="width: 14px; height: 14px;" class="animate-spin"></i>
                Cargando sistema operativo...
            </div>
            <div class="loader-bg">
                <div class="loader-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Inicializar iconos
        lucide.createIcons();

        // 2. URL del archivo a cargar
        const targetUrl = "https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/refs/heads/main/indexok%20.html";
        let nextHtml = "";

        // 3. Empezar a descargar el contenido de indexok .html de inmediato
        fetch(targetUrl)
            .then(response => response.text())
            .then(data => {
                nextHtml = data;
                console.log("Sistema cargado en memoria.");
            })
            .catch(err => {
                console.error("Error cargando el sistema:", err);
            });

        // 4. Manejar la transición después de la presentación
        setTimeout(function() {
            // Añadir efecto de desvanecimiento
            document.getElementById('splash-screen').classList.add('fade-out');
            
            setTimeout(function() {
                if (nextHtml) {
                    // Reemplazar todo el documento con el nuevo HTML
                    document.open();
                    document.write(nextHtml);
                    document.close();
                } else {
                    // Si la descarga falló o es lenta, redirigir como última opción
                    window.location.href = targetUrl;
                }
            }, 800);
        }, 4000); // 4 segundos de presentación
    </script>
</body>
</html>
