<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativo en Construcción</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .construction-icon {
            font-size: 6rem;
            margin-bottom: 30px;
            animation: shake 1.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        footer {
            margin-top: 50px;
            font-size: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="construction-icon">🚧</div>
        
        <h1>Aplicativo en Construcción</h1>
        
        <p class="subtitle">Estamos trabajando para mejorar tu experiencia</p>
        
        <div class="message">
            Gracias por tu paciencia.<br>
            Muy pronto estará disponible.
        </div>

        <footer>
            © 2026 - Todos los derechos reservados
        </footer>
    </div>
</body>
</html>
