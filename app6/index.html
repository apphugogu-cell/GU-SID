<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-GURALMO - Panel Fotográfico Profesional</title>
    
    <!-- Dependencias vía CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=JetBrains+Mono:wght@400;500;800&display=swap');

        :root {
            --bg-app: #f1f5f9;
            --ink: #0f172a;
            --line: #cbd5e1;
            --accent: #ea580c;
        }

        body {
            background-color: var(--bg-app);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: white;
            z-index: 9999;
            font-family: 'JetBrains Mono', monospace;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #ea580c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Sidebar Estilo Dashboard Técnico */
        .sidebar-control {
            width: 16rem;
            background-color: #0f172a;
            border-right: 1px solid #1e293b;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 1.5rem 1rem;
            overflow-y: auto;
            z-index: 40;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }

        .sidebar-section {
            padding: 1.25rem 0;
            border-bottom: 1px solid #1e293b;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: #64748b;
            margin-bottom: 1rem;
            display: block;
            font-weight: 800;
        }

        .sidebar-button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            justify-content: center;
        }

        .sidebar-button-primary {
            background-color: #ea580c;
            color: white;
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3);
        }

        .sidebar-button-primary:hover {
            background-color: #f97316;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(234, 88, 12, 0.4);
        }

        .sidebar-button-secondary {
            background-color: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
        }

        .sidebar-button-secondary:hover {
            background-color: #334155;
            color: white;
        }

        .sidebar-input {
            width: 100%;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 10px;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .sidebar-input:focus {
            border-color: #ea580c;
            background-color: #0f172a;
            box-shadow: 0 0 0 2px rgba(234, 88, 12, 0.2);
        }

        .main-viewport {
            flex: 1;
            padding: 2rem;
            background-color: #f1f5f9;
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
            margin-left: 16rem;
            background-image: 
                linear-gradient(to right, rgba(15, 23, 42, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Hoja A4 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            margin: 0 auto 3rem;
            background: white;
            padding: 12mm 15mm 12mm 20mm;
            border: 1px solid #000;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            transition: transform 0.3s ease;
        }

        @media print {
            .no-print { display: none !important; }
            body, html {
                background: white !important;
                height: auto !important;
                overflow: visible !important;
            }
            .main-viewport { 
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                background-image: none !important;
            }
            .page-wrapper {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                padding: 0 !important;
                transform: none !important;
                page-break-after: always !important;
            }
            .a4-page {
                margin: 0 !important;
                border: none !important;
                box-shadow: none !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
                transform: none !important;
                width: 210mm !important;
                height: 297mm !important;
            }
            @page { 
                size: A4 portrait; 
                margin: 0; 
            }
        }

        .sidebar-control::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-control::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-control::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .lucide-icon svg {
            display: block;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .photo-card {
            border-top: 2px solid #0f172a;
            border-bottom: 2px solid #0f172a;
            border-right: 2px solid #0f172a;
            border-left: 5px solid #0f172a;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .photo-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .photo-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            background: white;
            position: relative;
        }

        .photo-footer {
            background-color: rgba(241, 245, 249, 0.5);
            padding: 0.5rem 1rem;
            border-top: 1px solid #0f172a;
            min-height: 2.5rem;
        }

        .img-label {
            font-size: 7pt;
            font-weight: 900;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            flex-shrink: 0;
        }

        .img-name {
            font-size: 11pt;
            font-style: italic;
            color: #1e293b;
            line-height: 1.2;
            width: 100%;
            outline: none;
            cursor: text;
        }

        /* Modal de Importación */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 1000px;
            max-height: 85vh;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 1.5rem 2rem;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: #f8fafc;
        }

        .modal-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            background: white;
        }

        .import-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.5rem;
        }

        .import-item {
            background: white;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .import-item.selected {
            border-color: #ea580c;
            box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1);
        }

        .import-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        /* Botones de edición precisos */
        .edit-btn {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #0f172a;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 10px;
        }

        .edit-btn:hover {
            background: #ea580c;
            color: white;
            border-color: #ea580c;
        }

        .edit-btn-active {
            background: #ea580c;
            color: white;
            border-color: #ea580c;
        }

        .page-wrapper {
            transition: all 0.3s ease;
            position: relative;
        }

        .report-content-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; color: white; z-index: 9999; font-family: sans-serif;">
        <div class="spinner"></div>
        <div style="font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;">Cargando Panel Guralmo...</div>
        <div id="loader-msg" style="margin-top: 20px; font-size: 10px; opacity: 0.5; display: none; text-align: center;">Esto está tardando más de lo normal...<br>Verifique su conexión a internet.</div>
    </div>
    <script>
        setTimeout(() => {
            const msg = document.getElementById('loader-msg');
            if (msg) msg.style.display = 'block';
        }, 5000);
    </script>
    <script>
        // Manejador de errores global para mostrar en pantalla si falla la carga
        window.onerror = function(msg, url, line, col, error) {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = `<div style="color: #ef4444; padding: 20px; font-family: monospace; font-size: 12px; text-align: center; max-width: 80%;">
                    <h3 style="margin-bottom: 10px; font-weight: 900;">ERROR DE CARGA</h3>
                    <p style="margin-bottom: 5px;">${msg}</p>
                    <p style="opacity: 0.7;">Línea: ${line}, Col: ${col}</p>
                    <button onclick="location.reload()" style="margin-top: 20px; background: #ea580c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em;">Reintentar</button>
                </div>`;
            }
            return false;
        };
    </script>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            const [svg, setSvg] = useState('');

            useEffect(() => {
                const updateIcon = () => {
                    try {
                        if (window.lucide) {
                            const icons = window.lucide.icons || window.lucide;
                            const iconData = icons[name];
                            if (iconData && typeof iconData.toSvg === 'function') {
                                setSvg(iconData.toSvg({
                                    width: size,
                                    height: size,
                                    'stroke-width': 2,
                                }));
                                return true;
                            }
                        }
                    } catch (e) {
                        console.error('Error loading icon:', name, e);
                    }
                    return false;
                };

                if (!updateIcon()) {
                    const interval = setInterval(() => {
                        if (updateIcon()) clearInterval(interval);
                    }, 100);
                    return () => clearInterval(interval);
                }
            }, [name, size]);

            if (!svg) {
                return <span className={`inline-block ${className}`} style={{ width: size, height: size }}></span>;
            }

            return <span 
                className={`inline-flex items-center justify-center lucide-icon ${className}`}
                dangerouslySetInnerHTML={{ __html: svg }} 
                aria-hidden="true"
            />;
        };

        function App() {
            const [photos, setPhotos] = useState([]);
            const [stagedPhotos, setStagedPhotos] = useState([]);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [layoutMode, setLayoutMode] = useState(2);
            const [globalTitle, setGlobalTitle] = useState('PANEL FOTOGRAFICO');
            const [globalHeader, setGlobalHeader] = useState('Descripcion de obra...');
            const [globalFooter, setGlobalFooter] = useState('PANEL FOTOGRAFICO-GU');
            const [showReportHeader, setShowReportHeader] = useState(true);
            const [showReportFooter, setShowReportFooter] = useState(true);
            const [zoom, setZoom] = useState(53);
            const [viewMode, setViewMode] = useState('column'); // 'column' or 'grid'
            const [draggingId, setDraggingId] = useState(null);
            const [lastMousePos, setLastMousePos] = useState({ x: 0, y: 0 });
            const [isDraggingOver, setIsDraggingOver] = useState(false);
            const [draggedPhotoIndex, setDraggedPhotoIndex] = useState(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const [draggedStagedIndex, setDraggedStagedIndex] = useState(null);
            const [dragOverStagedIndex, setDragOverStagedIndex] = useState(null);

            const imagesInputRef = useRef(null);
            const folderInputRef = useRef(null);
            const projectInputRef = useRef(null);

            const saveProject = () => {
                const projectData = {
                    photos,
                    stagedPhotos,
                    layoutMode,
                    globalTitle,
                    globalHeader,
                    globalFooter,
                    showReportHeader,
                    showReportFooter,
                    zoom,
                    viewMode
                };
                const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `proyecto-guralmo-${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const loadProject = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.photos) setPhotos(data.photos);
                        if (data.stagedPhotos) setStagedPhotos(data.stagedPhotos);
                        if (data.layoutMode) setLayoutMode(data.layoutMode);
                        if (data.globalTitle) setGlobalTitle(data.globalTitle);
                        if (data.globalHeader) setGlobalHeader(data.globalHeader);
                        if (data.globalFooter) setGlobalFooter(data.globalFooter);
                        if (data.showReportHeader !== undefined) setShowReportHeader(data.showReportHeader);
                        if (data.showReportFooter !== undefined) setShowReportFooter(data.showReportFooter);
                        if (data.zoom) setZoom(data.zoom);
                        if (data.viewMode) setViewMode(data.viewMode);
                    } catch (err) {
                        console.error("Error al cargar el proyecto:", err);
                        alert("El archivo no es un proyecto válido.");
                    }
                };
                reader.readAsText(file);
                event.target.value = ''; // Reset input
            };

            useEffect(() => {
                const preventDefault = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                };
                window.addEventListener('dragover', preventDefault);
                window.addEventListener('drop', preventDefault);
                return () => {
                    window.removeEventListener('dragover', preventDefault);
                    window.removeEventListener('drop', preventDefault);
                    photos.forEach(photo => URL.revokeObjectURL(photo.url));
                };
            }, [photos]);

            const handleFiles = (files) => {
                if (!files || files.length === 0) return;

                stagedPhotos.forEach(p => URL.revokeObjectURL(p.url));
                const newPhotos = Array.from(files)
                    .filter(file => file.type.startsWith('image/'))
                    .map(file => {
                        const path = file.webkitRelativePath || file.name;
                        const name = path.replace(/\.[^/.]+$/, "").replace(/_/g, " ");

                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            file,
                            url: URL.createObjectURL(file),
                            name: name,
                            zoom: 1,
                            rotation: 0,
                            offset: { x: 0, y: 0 },
                            selected: true
                        };
                    });

                if (newPhotos.length > 0) {
                    setStagedPhotos(prev => [...prev, ...newPhotos]);
                    setIsImportModalOpen(true);
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDraggingOver(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDraggingOver(false);
            };

            const handleDrop = async (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDraggingOver(false);

                const items = e.dataTransfer.items;
                if (!items) return;

                const files = [];
                const readEntry = async (entry) => {
                    if (entry.isFile) {
                        const file = await new Promise((resolve) => entry.file(resolve));
                        if (file.type.startsWith('image/')) {
                            files.push(file);
                        }
                    } else if (entry.isDirectory) {
                        const reader = entry.createReader();
                        const readAllEntries = async () => {
                            const entries = await new Promise((resolve) => reader.readEntries(resolve));
                            if (entries.length > 0) {
                                for (const childEntry of entries) {
                                    await readEntry(childEntry);
                                }
                                await readAllEntries();
                            }
                        };
                        await readAllEntries();
                    }
                };

                const promises = [];
                for (let i = 0; i < items.length; i++) {
                    const entry = items[i].webkitGetAsEntry();
                    if (entry) {
                        promises.push(readEntry(entry));
                    }
                }

                await Promise.all(promises);
                if (files.length > 0) {
                    handleFiles(files);
                }
            };

            const confirmImport = () => {
                const selected = stagedPhotos.filter(p => p.selected);
                setPhotos(prev => [...prev, ...selected]);
                setStagedPhotos([]);
                setIsImportModalOpen(false);
            };

            const cancelImport = () => {
                stagedPhotos.forEach(p => URL.revokeObjectURL(p.url));
                setStagedPhotos([]);
                setIsImportModalOpen(false);
            };

            const removePhoto = (id) => {
                setPhotos(prev => {
                    const photoToRemove = prev.find(p => p.id === id);
                    if (photoToRemove) URL.revokeObjectURL(photoToRemove.url);
                    return prev.filter(p => p.id !== id);
                });
            };

            const handlePhotoDragStart = (e, index) => {
                setDraggedPhotoIndex(index);
                e.dataTransfer.effectAllowed = 'move';
                // Create a ghost image or just let it be
            };

            const handlePhotoDragOver = (e, index) => {
                e.preventDefault();
                if (draggedPhotoIndex === null) return;
                setDragOverIndex(index);
            };

            const handlePhotoDrop = (e, targetIndex) => {
                e.preventDefault();
                if (draggedPhotoIndex === null || draggedPhotoIndex === targetIndex) {
                    setDraggedPhotoIndex(null);
                    setDragOverIndex(null);
                    return;
                }

                setPhotos(prev => {
                    const newPhotos = [...prev];
                    const [movedPhoto] = newPhotos.splice(draggedPhotoIndex, 1);
                    newPhotos.splice(targetIndex, 0, movedPhoto);
                    return newPhotos;
                });
                setDraggedPhotoIndex(null);
                setDragOverIndex(null);
            };

            const removeStagedPhoto = (id) => {
                setStagedPhotos(prev => {
                    const photo = prev.find(p => p.id === id);
                    if (photo) URL.revokeObjectURL(photo.url);
                    return prev.filter(p => p.id !== id);
                });
            };

            const moveStagedPhoto = (index, direction) => {
                setStagedPhotos(prev => {
                    const newArr = [...prev];
                    const targetIndex = index + direction;
                    if (targetIndex < 0 || targetIndex >= newArr.length) return prev;
                    [newArr[index], newArr[targetIndex]] = [newArr[targetIndex], newArr[index]];
                    return newArr;
                });
            };

            const handleStagedDragStart = (e, index) => {
                setDraggedStagedIndex(index);
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleStagedDragOver = (e, index) => {
                e.preventDefault();
                if (draggedStagedIndex === null) return;
                setDragOverStagedIndex(index);
            };

            const handleStagedDrop = (e, targetIndex) => {
                e.preventDefault();
                if (draggedStagedIndex === null || draggedStagedIndex === targetIndex) {
                    setDraggedStagedIndex(null);
                    setDragOverStagedIndex(null);
                    return;
                }

                setStagedPhotos(prev => {
                    const newPhotos = [...prev];
                    const [movedPhoto] = newPhotos.splice(draggedStagedIndex, 1);
                    newPhotos.splice(targetIndex, 0, movedPhoto);
                    return newPhotos;
                });
                setDraggedStagedIndex(null);
                setDragOverStagedIndex(null);
            };

            const clearAll = () => {
                if (window.confirm('¿Eliminar todas las fotos y limpiar todo?')) {
                    photos.forEach(p => URL.revokeObjectURL(p.url));
                    setPhotos([]);
                }
            };

            const totalPages = Math.ceil(photos.length / layoutMode);

            return (
                <div className="flex bg-slate-100 min-h-screen">
                    {/* Sidebar de Control */}
                    <aside className="sidebar-control no-print">
                        <div className="mb-8 border-b border-slate-800 pb-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-orange-600 p-2.5 rounded shadow-lg shadow-orange-900/40">
                                    <Icon name="FileText" className="text-white" size={22} />
                                </div>
                                <div>
                                    <h1 className="text-[12px] font-black text-white uppercase tracking-widest leading-none">PANEL FOTOGRAFICO</h1>
                                    <span className="text-[8px] font-bold text-slate-500 uppercase tracking-widest mt-1.5 block">SISTEMA DE REPORTES GU</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 space-y-2">
                            <section className="sidebar-section">
                                <span className="sidebar-title">Importación</span>
                                <div className="grid grid-cols-1 gap-2">
                                    <button onClick={() => imagesInputRef.current?.click()} className="sidebar-button sidebar-button-primary">
                                        <Icon name="Image" size={14} /> Añadir Imágenes
                                    </button>
                                    <button onClick={() => folderInputRef.current?.click()} className="sidebar-button sidebar-button-secondary">
                                        <Icon name="FolderOpen" size={14} className="text-orange-500" /> Cargar Carpeta
                                    </button>
                                </div>
                            </section>

                            <section className="sidebar-section">
                                <span className="sidebar-title">Estructura</span>
                                <div className="flex p-1 bg-slate-800 border border-slate-700 rounded-lg">
                                    <button onClick={() => setLayoutMode(2)} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-md text-[9px] font-black uppercase tracking-widest transition-all ${layoutMode === 2 ? 'bg-orange-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <Icon name="LayoutList" size={12} /> 2 Fotos
                                    </button>
                                    <button onClick={() => setLayoutMode(4)} className={`flex-1 flex items-center justify-center gap-2 py-2 rounded-md text-[9px] font-black uppercase tracking-widest transition-all ${layoutMode === 4 ? 'bg-orange-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                        <Icon name="LayoutGrid" size={12} /> 4 Fotos
                                    </button>
                                </div>
                            </section>

                            <section className="sidebar-section">
                                <span className="sidebar-title">Metadatos</span>
                                <div className="space-y-3">
                                    <textarea 
                                        value={globalTitle}
                                        onChange={(e) => setGlobalTitle(e.target.value)}
                                        rows="2"
                                        placeholder="TÍTULO DEL PROYECTO..."
                                        className="sidebar-input resize-none"
                                    />
                                    <textarea 
                                        value={globalHeader}
                                        onChange={(e) => setGlobalHeader(e.target.value)}
                                        rows="2"
                                        placeholder="MEMBRETE INFORMATIVO..."
                                        className="sidebar-input resize-none"
                                    />
                                    <input 
                                        type="text"
                                        value={globalFooter}
                                        onChange={(e) => setGlobalFooter(e.target.value)}
                                        placeholder="PIE DE PÁGINA..."
                                        className="sidebar-input"
                                    />

                                    <div className="pt-2 space-y-2">
                                        <label className="flex items-center gap-3 cursor-pointer group">
                                            <div className={`w-4 h-4 rounded border flex items-center justify-center transition-all ${showReportHeader ? 'bg-orange-600 border-orange-600' : 'bg-slate-800 border-slate-700'}`}>
                                                {showReportHeader && <Icon name="Check" size={10} className="text-white" />}
                                                <input type="checkbox" checked={showReportHeader} onChange={(e) => setShowReportHeader(e.target.checked)} className="hidden" />
                                            </div>
                                            <span className="text-[9px] font-bold text-slate-400 group-hover:text-slate-200 transition-colors uppercase tracking-widest">Cabecera</span>
                                        </label>
                                        <label className="flex items-center gap-3 cursor-pointer group">
                                            <div className={`w-4 h-4 rounded border flex items-center justify-center transition-all ${showReportFooter ? 'bg-orange-600 border-orange-600' : 'bg-slate-800 border-slate-700'}`}>
                                                {showReportFooter && <Icon name="Check" size={10} className="text-white" />}
                                                <input type="checkbox" checked={showReportFooter} onChange={(e) => setShowReportFooter(e.target.checked)} className="hidden" />
                                            </div>
                                            <span className="text-[9px] font-bold text-slate-400 group-hover:text-slate-200 transition-colors uppercase tracking-widest">Pie de Página</span>
                                        </label>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div className="pt-6 border-t border-slate-800 space-y-2">
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <button onClick={saveProject} className="sidebar-button bg-slate-800 hover:bg-slate-700 text-white border-slate-700">
                                    <Icon name="Save" size={14} /> Guardar
                                </button>
                                <button onClick={() => projectInputRef.current?.click()} className="sidebar-button bg-slate-800 hover:bg-slate-700 text-white border-slate-700">
                                    <Icon name="FolderOpen" size={14} /> Cargar
                                </button>
                                <input type="file" ref={projectInputRef} onChange={loadProject} accept=".json" className="hidden" />
                            </div>
                            <button onClick={() => window.print()} disabled={photos.length === 0} className="sidebar-button sidebar-button-primary">
                                <Icon name="Printer" size={14} /> Generar Reporte
                            </button>
                            <button onClick={clearAll} className="w-full flex items-center justify-center gap-2 py-2 text-slate-500 hover:text-red-400 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all border-none bg-transparent cursor-pointer">
                                <Icon name="RotateCcw" size={12} /> Limpiar Todo
                            </button>
                        </div>
                    </aside>

                    {/* Área de Visualización */}
                    <main 
                        className={`main-viewport ${isDraggingOver ? 'bg-orange-50 ring-4 ring-orange-400 ring-inset' : ''}`}
                        onDragEnter={handleDragOver}
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleDrop}
                        onMouseMove={(e) => {
                            if (!draggingId) return;
                            const photo = photos.find(p => p.id === draggingId);
                            if (!photo) return;
                            const dx = e.clientX - lastMousePos.x;
                            const dy = e.clientY - lastMousePos.y;
                            const pageScale = zoom / 100;
                            setPhotos(prev => prev.map(p => p.id === draggingId ? { 
                                ...p, offset: { x: p.offset.x + dx / pageScale, y: p.offset.y + dy / pageScale } 
                            } : p));
                            setLastMousePos({ x: e.clientX, y: e.clientY });
                        }}
                        onMouseUp={() => setDraggingId(null)}
                        onMouseLeave={() => setDraggingId(null)}
                    >
                        <div className="fixed top-6 right-6 z-50 flex flex-col items-center gap-2 no-print bg-slate-900/95 backdrop-blur text-white p-2 rounded-3xl border border-slate-700 shadow-2xl">
                            <div className="flex flex-col items-center gap-1 pb-2 border-b border-slate-700 w-full">
                                <button onClick={() => setViewMode('column')} className={`p-1.5 rounded-full transition-all ${viewMode === 'column' ? 'bg-orange-600 text-white' : 'text-slate-400 hover:text-white'}`} title="Vista 1 Hoja">
                                    <Icon name="File" size={14} />
                                </button>
                                <button onClick={() => setViewMode('grid')} className={`p-1.5 rounded-full transition-all ${viewMode === 'grid' ? 'bg-orange-600 text-white' : 'text-slate-400 hover:text-white'}`} title="Vista 2 Hojas">
                                    <Icon name="Files" size={14} />
                                </button>
                            </div>
                            <div className="flex flex-col items-center gap-3 py-1">
                                <span className="text-[9px] font-black">{zoom}%</span>
                                <div className="h-24 flex items-center justify-center">
                                    <input 
                                        type="range" 
                                        min="40" 
                                        max="150" 
                                        value={zoom} 
                                        onChange={(e) => setZoom(parseInt(e.target.value))} 
                                        className="accent-orange-500 cursor-pointer"
                                        style={{ 
                                            WebkitAppearance: 'slider-vertical',
                                            width: '4px',
                                            height: '80px'
                                        }}
                                    />
                                </div>
                                <Icon name="Search" size={12} className="text-orange-500" />
                            </div>
                        </div>

                        <input type="file" ref={imagesInputRef} className="hidden" multiple accept="image/*" onChange={(e) => handleFiles(e.target.files)} />
                        <input type="file" ref={folderInputRef} className="hidden" webkitdirectory="" directory="" multiple accept="image/*" onChange={(e) => handleFiles(e.target.files)} />

                        {photos.length === 0 ? (
                            <div 
                                onClick={() => imagesInputRef.current?.click()} 
                                className={`h-[calc(100vh-4rem)] border-2 border-dashed rounded-2xl flex flex-col items-center justify-center transition-all cursor-pointer group ${isDraggingOver ? 'border-orange-500 bg-orange-50' : 'border-slate-300 bg-white hover:border-orange-400 hover:bg-slate-50'}`}
                            >
                                <div className="p-6 rounded-full mb-6 bg-slate-50 group-hover:bg-orange-50 transition-colors">
                                    <Icon name="ImagePlus" size={64} className="text-slate-300 group-hover:text-orange-400 transition-colors" />
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-tight">Panel Vacío</h2>
                                <p className="text-slate-400 text-sm font-medium mb-8">Arrastre sus fotografías o carpetas aquí para comenzar.</p>
                                <div className="flex gap-4">
                                    <button onClick={(e) => { e.stopPropagation(); imagesInputRef.current?.click(); }} className="px-8 py-3 bg-slate-900 text-white rounded-full text-[11px] font-black uppercase tracking-widest border-none cursor-pointer shadow-xl hover:bg-slate-800 transition-all">Seleccionar Imágenes</button>
                                    <button onClick={(e) => { e.stopPropagation(); folderInputRef.current?.click(); }} className="px-8 py-3 bg-orange-600 text-white rounded-full text-[11px] font-black uppercase tracking-widest border-none cursor-pointer shadow-xl hover:bg-orange-500 transition-all">Cargar Carpeta</button>
                                </div>
                            </div>
                        ) : (
                            <div id="print-area" className={`flex ${viewMode === 'grid' ? 'flex-row flex-wrap justify-center gap-x-4 gap-y-4' : 'flex-col items-center'}`}>
                                {Array.from({ length: totalPages }).map((_, pageIndex) => (
                                    <div 
                                        key={pageIndex} 
                                        className="page-wrapper" 
                                        style={{ 
                                            width: `${210 * (zoom / 100)}mm`, 
                                            height: `${297 * (zoom / 100)}mm`, 
                                            marginBottom: viewMode === 'column' ? '2rem' : '0',
                                            flexShrink: 0 
                                        }}
                                    >
                                        <div 
                                            className={`a4-page flex flex-col ${(!showReportHeader && !showReportFooter) ? 'justify-center' : ''}`} 
                                            style={{ 
                                                transform: `scale(${zoom / 100})`, 
                                                transformOrigin: 'top left',
                                                margin: 0 
                                            }}
                                        >
                                        
                                        <div className="report-content-layer">
                                            {showReportHeader && (
                                                <div className="text-center mb-8 relative">
                                                    <div className="flex items-center justify-between mb-4 border-b-4 border-double border-slate-900 pb-3">
                                                        <div className="w-1/4 flex justify-start">
                                                        </div>
                                                        <h2 className="italic text-[18pt] font-bold uppercase tracking-tight leading-tight flex-1">{globalTitle}</h2>
                                                        <div className="w-1/4"></div>
                                                    </div>
                                                    {globalHeader.trim() && <div className="bg-slate-900 text-white p-5 text-[10pt] font-mono leading-relaxed border border-slate-900 whitespace-pre-wrap text-center shadow-xl">{globalHeader}</div>}
                                                </div>
                                            )}

                                            <div className={`grid ${(!showReportHeader && !showReportFooter) ? 'gap-12 h-[260mm]' : 'gap-6 h-[210mm]'} ${layoutMode === 2 ? 'grid-rows-2' : 'grid-cols-2 grid-rows-2'}`}>
                                                {photos.slice(pageIndex * layoutMode, (pageIndex + 1) * layoutMode).map((photo, i) => {
                                                    const globalIndex = pageIndex * layoutMode + i;
                                                    return (
                                                        <div 
                                                            key={photo.id} 
                                                            draggable="true"
                                                            onDragStart={(e) => handlePhotoDragStart(e, globalIndex)}
                                                            onDragOver={(e) => handlePhotoDragOver(e, globalIndex)}
                                                            onDrop={(e) => handlePhotoDrop(e, globalIndex)}
                                                            onDragEnd={() => { setDraggedPhotoIndex(null); setDragOverIndex(null); }}
                                                            className={`photo-card group relative transition-all mx-auto ${layoutMode === 2 ? 'w-[calc(100%-34px)]' : 'w-[calc(100%-30px)]'} ${dragOverIndex === globalIndex ? 'ring-4 ring-orange-500 ring-offset-2 scale-[1.02] z-30' : ''} ${draggedPhotoIndex === globalIndex ? 'opacity-40' : ''}`}
                                                        >
                                                            <button onClick={() => removePhoto(photo.id)} className="no-print absolute top-3 right-3 z-10 w-8 h-8 bg-red-600 text-white rounded-full border-none cursor-pointer shadow-lg hover:scale-110 transition-all flex items-center justify-center font-black text-xs opacity-0 group-hover:opacity-100">E</button>
                                                            <div className="photo-container">
                                                                <div className="no-print absolute right-1 top-1/2 -translate-y-1/2 z-20 flex flex-col items-center gap-1 bg-slate-900/60 p-1 rounded-lg backdrop-blur-md border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <button onClick={(e) => { e.stopPropagation(); setPhotos(prev => prev.map(p => p.id === photo.id ? { ...p, rotation: (p.rotation + 90) % 360 } : p)); }} className="edit-btn" title="Rotar 90°">
                                                                        <div className="w-2.5 h-2.5 rounded-full border-2 border-current"></div>
                                                                    </button>
                                                                    <div className="h-[1px] w-full bg-white/10"></div>
                                                                    <button onClick={(e) => { e.stopPropagation(); setPhotos(prev => prev.map(p => p.id === photo.id ? { ...p, zoom: Math.min(3, p.zoom + 0.1) } : p)); }} className="edit-btn font-black">+</button>
                                                                    <button onClick={(e) => { e.stopPropagation(); setPhotos(prev => prev.map(p => p.id === photo.id ? { ...p, zoom: Math.max(0.5, p.zoom - 0.1) } : p)); }} className="edit-btn font-black">-</button>
                                                                    <div className="h-[1px] w-full bg-white/10"></div>
                                                                    <button onClick={(e) => { e.stopPropagation(); setPhotos(prev => prev.map(p => p.id === photo.id ? { ...p, zoom: 1, rotation: 0, offset: { x: 0, y: 0 } } : p)); }} className="edit-btn font-black" title="Reset">R</button>
                                                                </div>
                                                                <div 
                                                                    className="w-full h-full flex items-center justify-center overflow-hidden cursor-move" 
                                                                    onMouseDown={(e) => { 
                                                                        if (e.button !== 0) return;
                                                                        e.preventDefault(); 
                                                                        setDraggingId(photo.id); 
                                                                        setLastMousePos({ x: e.clientX, y: e.clientY }); 
                                                                    }}
                                                                >
                                                                    <img src={photo.url} alt={photo.name} draggable="false" style={{ transform: `translate(${photo.offset.x}px, ${photo.offset.y}px) rotate(${photo.rotation}deg) scale(${photo.zoom})`, transition: draggingId === photo.id ? 'none' : 'transform 0.1s ease-out' }} className="max-w-full max-h-full object-contain" />
                                                                </div>
                                                            </div>
                                                            <div className="photo-footer">
                                                                <div className="flex items-baseline gap-2">
                                                                    <span className="img-label">IMG {(globalIndex + 1).toString().padStart(3, '0')}</span>
                                                                    <div contentEditable suppressContentEditableWarning onBlur={(e) => setPhotos(prev => prev.map(p => p.id === photo.id ? { ...p, name: e.currentTarget.innerText } : p))} className="img-name">{photo.name}</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {showReportFooter && (
                                                <div className="absolute bottom-[6px] left-0 right-0 flex justify-between items-center border-t-2 border-slate-900 pt-2">
                                                    <div contentEditable suppressContentEditableWarning onBlur={(e) => setGlobalFooter(e.currentTarget.innerText)} className="text-[9pt] font-mono text-slate-600 font-bold uppercase tracking-widest outline-none">{globalFooter}</div>
                                                    <div className="bg-slate-900 text-white px-4 py-1.5 rounded-md text-[9pt] font-black shadow-lg">{pageIndex + 1}/{totalPages}</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal de Importación */}
                    {isImportModalOpen && (
                        <div className="modal-overlay no-print">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <div className="flex items-center gap-3">
                                        <Icon name="Search" size={20} className="text-orange-500" />
                                        <h3 className="text-sm font-black uppercase tracking-widest">Verificación de Imágenes (Carpeta Seleccionada)</h3>
                                    </div>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase">{stagedPhotos.length} Archivos Encontrados</span>
                                </div>
                                <div className="modal-body">
                                    <div className="import-grid">
                                        {stagedPhotos.map((photo, idx) => (
                                            <div 
                                                key={photo.id} 
                                                draggable="true"
                                                onDragStart={(e) => handleStagedDragStart(e, idx)}
                                                onDragOver={(e) => handleStagedDragOver(e, idx)}
                                                onDrop={(e) => handleStagedDrop(e, idx)}
                                                onDragEnd={() => { setDraggedStagedIndex(null); setDragOverStagedIndex(null); }}
                                                className={`import-item group relative transition-all ${photo.selected ? 'selected' : 'opacity-50'} ${dragOverStagedIndex === idx ? 'ring-4 ring-orange-500 ring-offset-2 scale-105 z-30' : ''} ${draggedStagedIndex === idx ? 'opacity-30' : ''}`}
                                            >
                                                <div className="absolute top-2 right-2 z-20 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity no-print">
                                                    <button onClick={(e) => { e.stopPropagation(); moveStagedPhoto(idx, -1); }} className="w-6 h-6 bg-slate-900 text-white rounded flex items-center justify-center text-[10px] hover:bg-orange-600 shadow-lg border-none cursor-pointer" title="Mover Izquierda">←</button>
                                                    <button onClick={(e) => { e.stopPropagation(); moveStagedPhoto(idx, 1); }} className="w-6 h-6 bg-slate-900 text-white rounded flex items-center justify-center text-[10px] hover:bg-orange-600 shadow-lg border-none cursor-pointer" title="Mover Derecha">→</button>
                                                    <button onClick={(e) => { e.stopPropagation(); removeStagedPhoto(photo.id); }} className="w-6 h-6 bg-red-600 text-white rounded flex items-center justify-center text-[10px] hover:bg-red-700 shadow-lg border-none cursor-pointer" title="Eliminar">E</button>
                                                </div>
                                                <div className="cursor-pointer" onClick={() => setStagedPhotos(prev => prev.map(p => p.id === photo.id ? { ...p, selected: !p.selected } : p))}>
                                                    <img src={photo.url} className="import-thumb" alt="Preview" draggable="false" />
                                                    <div className="p-2 bg-white">
                                                        <p className="text-[8px] font-bold text-slate-600 truncate uppercase">{photo.name}</p>
                                                    </div>
                                                </div>
                                                <div className="absolute bottom-2 right-2 pointer-events-none">
                                                    <div className={`w-4 h-4 rounded-full flex items-center justify-center border ${photo.selected ? 'bg-orange-600 border-orange-600' : 'bg-white border-slate-300'}`}>
                                                        {photo.selected && <Icon name="Check" size={10} className="text-white" />}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="modal-footer">
                                    <button onClick={cancelImport} className="px-6 py-2 text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-slate-800 transition-colors">Cancelar</button>
                                    <button onClick={confirmImport} className="px-8 py-2 bg-orange-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg hover:bg-orange-500 transition-all">Confirmar Importación</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Ocultar loader cuando React esté listo
        setTimeout(() => {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.transition = 'opacity 0.5s ease';
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }
        }, 1000);
    </script>
</body>
</html>
