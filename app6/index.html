<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Fotográfico - SEDALIB</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f0f0f0;padding:20px;}
    .container{max-width:1200px;margin:auto;background:white;padding:30px;border-radius:15px;box-shadow:0 0 30px rgba(0,0,0,0.3);}
    h1{text-align:center;color:#1e3d59;font-size:28pt;margin-bottom:20px;}

    /* Controles en filas y columnas */
    .controles{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap:15px;
      margin:30px 0;
      text-align:center;
    }
    .btn, .modo{
      padding:11px 20px;
      border:none;
      border-radius:8px;
      font-size:14pt;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }
    .btn{background:#0066cc;color:white;}
    .btn:hover{background:#004a99;}
    .modo{background:#1e3d59;color:white;}
    .modo.activo{background:#006400;}
    .btn.print{background:#006400;}
    .btn.print:hover{background:#004d00;}
    .btn.limpiar{background:#c62828;}
    .btn.limpiar:hover{background:#a51d1d;}

    .contador{text-align:center;font-size:20pt;color:#0066cc;margin:25px;font-weight:bold;}
    textarea{width:100%;padding:10px;margin:15px 0;font-size:11pt;border:2px solid #0066cc;border-radius:8px;height:90px;}
    
    /* Membrete + botón APLICAR en la misma línea */
    .membrete-box{
      background:#e6f2ff;padding:20px;border-radius:10px;display:flex;align-items:flex-end;gap:15px;flex-wrap:wrap;
    }
    .membrete-box textarea{flex:1;margin:0;}
    .membrete-box button{
      padding:10px 20px;font-size:13pt;height:44px; /* misma altura que el textarea */
    }

    .a4{width:210mm;height:297mm;margin:40px auto;background:white;padding:10mm 12mm;
        border:3px solid black;box-sizing:border-box;font-family:Arial,sans-serif;
        page-break-after:always;position:relative;box-shadow:0 0 20px rgba(0,0,0,0.3);}
    .a4 h1{font-size:16pt;text-align:center;margin:0 0 8px;padding-bottom:6px;border-bottom:4px double black;}
    .membrete{width:175mm;margin:10px auto 12px;background:#1e3d59;color:white;padding:12px;
              font-size:9.5pt;font-weight:bold;line-height:1.4;text-align:center;border:2px solid black;}
    .pie{background:#a6d8ff;padding:10px;font-weight:bold;font-size:12pt;position:absolute;bottom:0;width:100%;}
    .eliminar{position:absolute;top:5px;right:5px;background:red;color:white;border:none;
              width:30px;height:30px;border-radius:50%;font-size:18pt;cursor:pointer;z-index:10;}
    .modo2 .fotos{display:flex;flex-direction:column;gap:18px;height:218mm;}
    .modo2 .foto{flex:1;position:relative;overflow:hidden;border:3px solid black;background:white;}
    .modo2 .foto img{width:100%;height:100%;object-fit:contain;background:white;}
    .modo4 .fotos{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:210mm;margin-top:10px;}
    .modo4 .foto{border:3px solid black;background:white;text-align:center;position:relative;overflow:hidden;}
    .modo4 .foto img{width:100%;height:86mm;object-fit:contain;background:white;}
    @media print{
      body{background:white;margin:0;padding:0;}
      .container,.controles,.contador,.eliminar,.membrete-box button{display:none !important;}
      .a4{box-shadow:none;margin:0 0 20mm 0;}
      @page{size:A4 portrait;margin:0;}
    }
  </style>
</head>
<body>
<div class="container">
  <h1>PANEL FOTOGRÁFICO</h1>

  <div class="controles">
    <input type="file" id="carpeta" webkitdirectory directory style="display:none;">
    <button class="btn" onclick="document.getElementById('carpeta').click()">
      SELECCIONAR CARPETA
    </button>

    <button class="modo activo" id="btn2" onclick="cambiarModo(2)">2 FOTOS POR HOJA</button>
    <button class="modo" id="btn4" onclick="cambiarModo(4)">4 FOTOS POR HOJA</button>

    <button class="btn print" onclick="window.print()">GUARDAR COMO PDF</button>
    <button class="btn limpiar" onclick="limpiarTodo()">LIMPIAR TODO</button>
  </div>

  <!-- Membrete + botón APLICAR en la misma línea -->
  <div class="membrete-box">
    <div style="flex:1;">
      <strong>EDITA EL MEMBRETE AQUÍ (se aplica a todas las hojas)</strong>
      <textarea id="membreteGlobal">Adquisición de Medidor de Corriente de Agua; en el Parque de Medidores de la EPS SEDALIB S.A
y Ampliación de Cobertura de Micromedición - Provincias de Trujillo, Ascope, Chepén
y el Distrito de Trujillo, Provincia Trujillo, Departamento La Libertad - Segunda Etapa con CUI N° 2574429</textarea>
    </div>
    <button class="btn" onclick="actualizarMembreteGlobal()">APLICAR</button>
  </div>

  <div class="contador" id="contador">0 hojas generadas</div>
</div>

<div id="paneles"></div>

<script>
let modo = 2;
let fotosCargadas = [];

function cambiarModo(n) {
  modo = n;
  document.getElementById('btn2').classList.toggle('activo', n===2);
  document.getElementById('btn4').classList.toggle('activo', n===4);
  generarPaneles();
}

function actualizarMembreteGlobal() {
  const texto = document.getElementById('membreteGlobal').value.replace(/\n/g, '<br>');
  document.querySelectorAll('.membrete').forEach(m => m.innerHTML = texto);
}

document.getElementById('carpeta').addEventListener('change', function(e) {
  fotosCargadas = Array.from(e.target.files)
    .filter(f => f.type.startsWith('image/'))
    .sort((a,b) => a.name.localeCompare(b.name));
  generarPaneles();
});

function generarPaneles() {
  if (fotosCargadas.length === 0) return;
  const nombreCarpeta = (fotosCargadas[0].webkitRelativePath || "").split('/')[0];
  const contenedor = document.getElementById('paneles');
  contenedor.innerHTML = '';
  const fotosPorHoja = modo === 2 ? 2 : 4;
  const totalHojas = Math.ceil(fotosCargadas.length / fotosPorHoja);
  const membreteActual = document.getElementById('membreteGlobal').value.replace(/\n/g, '<br>');

  for (let hoja = 0; hoja < totalHojas; hoja++) {
    const inicio = hoja * fotosPorHoja;
    const fotosHoja = fotosCargadas.slice(inicio, inicio + fotosPorHoja);
    const panel = document.createElement('div');
    panel.className = `a4 modo${modo}`;
    panel.innerHTML = `
      <h1>PANEL FOTOGRÁFICO DE INTERVENCIÓN DEL PROYECTO</h1>
      <div class="membrete">${membreteActual}</div>
      <div class="fotos">
        ${fotosHoja.map((foto, i) => {
          const idxGlobal = inicio + i;
          const nombreSinExt = foto.name.split('.').slice(0,-1).join('.');
          const desc = `IMG. ${(idxGlobal+1).toString().padStart(2,'0')} – ${nombreCarpeta} - ${nombreSinExt}`;
         
          const reader = new FileReader();
          reader.onload = e => panel.querySelectorAll('img')[i].src = e.target.result;
          reader.readAsDataURL(foto);
          return `
            <div class="foto">
              <button class="eliminar" onclick="eliminarFoto(${idxGlobal})">X</button>
              <img src="">
              <div class="pie" contenteditable="true">${desc}</div>
            </div>`;
        }).join('')}
      </div>
    `;
    contenedor.appendChild(panel);
  }
  document.getElementById('contador').textContent =
    `${totalHojas} hoja(s) - ${fotosCargadas.length} foto(s) cargadas`;
}

function eliminarFoto(index) {
  fotosCargadas.splice(index, 1);
  generarPaneles();
}

function limpiarTodo() {
  if(confirm("¿Eliminar todas las fotos y limpiar todo?")) {
    fotosCargadas = [];
    document.getElementById('paneles').innerHTML = '';
    document.getElementById('contador').textContent = "0 hojas generadas";
  }
}
</script>
</body>
</html>
