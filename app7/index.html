<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Procesador PDF Paralelo - Grupo Uralmo</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root { --primary: #1e40af; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
    }
    .container {
      max-width: 1120px;
      margin: 30px auto;
      background: white;
      border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    header {
      background: linear-gradient(to right, #1e2937, #334155);
      color: white;
      padding: 24px 32px;
    }
    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
    }
    input[type="file"] {
      width: 100%;
      padding: 20px;
      border: 3px dashed #64748b;
      border-radius: 16px;
      background: #f8fafc;
      cursor: pointer;
    }
    .log {
      font-family: 'Consolas', monospace;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      max-height: 380px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    progress { height: 14px; border-radius: 9999px; }
    .batch-info {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e40af;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-6">
        <div class="chrome-frame p-3 bg-white rounded-3xl">
          <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoLentes.png" width="65" height="65">
        </div>
        <div>
          <img src="https://raw.githubusercontent.com/apphugogu-cell/GU-MEDIDORES/main/logoMEMBRETE.png" class="h-14 w-auto">
          <p class="text-xs text-slate-300">MEDIDORES 2 • INTELIGENCIA DOCUMENTAL</p>
        </div>
      </div>
      <div class="text-right">
        <div class="text-3xl font-bold">Procesador PDF Paralelo</div>
        <div class="text-emerald-400 text-sm">APP 007 • Avance por Lotes</div>
      </div>
    </div>
  </header>

  <div class="p-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- Configuración -->
      <div class="lg:col-span-8 card">
        <h3 class="font-bold text-xl mb-6 flex items-center gap-3">
          <i data-lucide="settings" class="w-6 h-6"></i> Configuración Avanzada
        </h3>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Archivos simultáneos -->
          <div>
            <label class="block text-sm font-semibold mb-2">Archivos PDF simultáneos</label>
            <input type="number" id="parallelCount" value="20" min="1" max="50" 
                   class="w-full p-4 border border-slate-300 rounded-2xl text-lg text-center font-bold">
            <p class="text-xs text-slate-500 mt-1">Recomendado: 2–4 (más de 5 puede ralentizar el navegador)</p>
          </div>

          <!-- Descarga automática -->
          <div>
            <label class="block text-sm font-semibold mb-2">Descarga automática cada</label>
            <select id="batchSize" class="w-full p-4 border border-slate-300 rounded-2xl text-lg">
              <option value="25">25 PDFs</option>
              <option value="50" selected>50 PDFs (Recomendado)</option>
              <option value="75">75 PDFs</option>
              <option value="100">100 PDFs</option>
              <option value="150">150 PDFs</option>
              <option value="0">Solo al final</option>
            </select>
          </div>

          <!-- Formato -->
          <div>
            <label class="block text-sm font-semibold mb-2">Formato de Imágenes</label>
            <div class="flex gap-6">
              <label class="flex items-center gap-2"><input type="radio" name="imgFormat" value="png" checked> PNG</label>
              <label class="flex items-center gap-2"><input type="radio" name="imgFormat" value="jpeg"> JPEG</label>
            </div>
            <div id="jpegQualityRow" class="hidden mt-4">
              <div class="flex items-center gap-4">
                <span class="text-sm">Calidad:</span>
                <input type="range" id="jpegQuality" min="10" max="95" value="65" step="5" class="flex-1">
                <span id="qualityValue" class="font-bold">65%</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Qué exportar -->
        <div class="mt-8">
          <h4 class="font-semibold mb-3">Qué exportar</h4>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm">
            <label class="flex items-center gap-2"><input type="checkbox" id="chkOriginal" checked> PDF Original</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="chkMenor" checked> Carpeta Fotos</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="chkMayorPng"> Carpeta Documentos</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="chkMayorPdf" checked> PDF Documentos</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="chkUnido" checked> PDF Imágenes Centradas</label>
          </div>
        </div>
      </div>

      <!-- Selector de archivos -->
      <div class="lg:col-span-4 card flex flex-col">
        <h4 class="font-semibold mb-4">Seleccionar PDFs / Carpeta</h4>
        <input type="file" id="pdfFiles" accept="application/pdf" multiple webkitdirectory directory />
        <button id="btnProcesar" class="mt-auto bg-blue-700 hover:bg-blue-800 text-white font-bold py-7 rounded-2xl text-xl disabled:opacity-50" disabled>
          <i data-lucide="play-circle" class="inline mr-3 w-6 h-6"></i>
          INICIAR PROCESAMIENTO
        </button>
      </div>
    </div>

    <!-- Avance por lote -->
    <div id="batchProgress" class="batch-info text-center my-6 hidden">
      Lote <span id="currentBatch" class="text-3xl font-bold">1</span> 
      de <span id="totalBatches" class="text-3xl font-bold">1</span>
      <span id="batchRange" class="text-slate-500 ml-4"></span>
    </div>

    <div id="progress" class="text-center text-2xl font-semibold text-slate-700 my-4 min-h-[50px]"></div>
    <div id="globalProgressContainer" class="hidden mb-6"><progress id="globalProgress" value="0" max="100" class="w-full"></progress></div>

    <div class="log" id="log"></div>

    <div id="downloadSection" class="hidden text-center mt-10">
      <button id="btnDescargar" class="bg-emerald-600 hover:bg-emerald-700 text-white px-16 py-7 rounded-2xl text-2xl font-bold">
        <i data-lucide="download" class="inline mr-3 w-7 h-7"></i>
        DESCARGAR ÚLTIMA PARTE
      </button>
    </div>
  </div>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.worker.min.mjs';

const { jsPDF } = window.jspdf;

let zipGlobal = new JSZip();
let processedCount = 0;
let batchNumber = 1;

document.querySelectorAll('input[name="imgFormat"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('jpegQualityRow').classList.toggle('hidden', r.value !== 'jpeg');
  });
});

document.getElementById('jpegQuality').addEventListener('input', function() {
  document.getElementById('qualityValue').textContent = this.value + '%';
});

const input = document.getElementById('pdfFiles');
const btnProcesar = document.getElementById('btnProcesar');
const logEl = document.getElementById('log');
const batchProgressEl = document.getElementById('batchProgress');
const currentBatchEl = document.getElementById('currentBatch');
const totalBatchesEl = document.getElementById('totalBatches');
const batchRangeEl = document.getElementById('batchRange');

function logMsg(msg, error = false) {
  const div = document.createElement('div');
  div.textContent = msg;
  div.style.color = error ? '#fda4af' : '#e2e8f0';
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

input.addEventListener('change', () => {
  btnProcesar.disabled = input.files.length === 0;
});

async function processSinglePDF(file, config) {
  const baseName = file.name.replace(/\.pdf$/i, '');
  const target = zipGlobal.folder(baseName);

  try {
    if (config.includeOriginal) {
      target.file(file.name, await file.arrayBuffer());
    }

    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    const numPages = pdf.numPages;

    const fotosFolder = config.includeFotos ? target.folder('Fotos') : null;
    const docsFolder = config.includeDocumentosImg ? target.folder('Documentos') : null;

    const whites = [];
    const todas = [];
    const mime = config.format === 'jpeg' ? 'image/jpeg' : 'image/png';
    const ext = config.format === 'jpeg' ? 'jpg' : 'png';

    for (let p = 1; p <= numPages; p++) {
      const page = await pdf.getPage(p);
      const vp = page.getViewport({ scale: 2.8 });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width;
      canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

      const cropped = cropWhiteBorders(canvas);
      const { isMayor } = analizarBlancos(cropped);
      const b64 = cropped.toDataURL(mime, config.jpegQuality).split(',')[1];

      todas.push({ b64 });

      if (isMayor) {
        if (docsFolder) docsFolder.file(`p-${p.toString().padStart(3,'0')}.${ext}`, b64, { base64: true });
        whites.push(b64);
      } else if (fotosFolder) {
        fotosFolder.file(`p-${p.toString().padStart(3,'0')}.${ext}`, b64, { base64: true });
      }
    }

    const dpi = 200;
    if (whites.length > 0 && config.includePdfDocumentos) {
      let img = new Image();
      img.src = `data:image/png;base64,${whites[0]}`;
      await new Promise(r => img.onload = r);
      let w = (img.naturalWidth / dpi) * 25.4;
      let h = (img.naturalHeight / dpi) * 25.4;
      const doc = new jsPDF({ unit: 'mm', format: [w, h], orientation: w > h ? 'landscape' : 'portrait' });
      doc.addImage(whites[0], 'PNG', 0, 0, w, h);
      for (let j = 1; j < whites.length; j++) {
        img.src = `data:image/png;base64,${whites[j]}`;
        await new Promise(r => img.onload = r);
        w = (img.naturalWidth / dpi) * 25.4;
        h = (img.naturalHeight / dpi) * 25.4;
        doc.addPage([w, h], w > h ? 'landscape' : 'portrait');
        doc.addImage(whites[j], 'PNG', 0, 0, w, h);
      }
      target.file('PDF de Documentos.pdf', doc.output('arraybuffer'));
    }

    if (todas.length > 0 && config.includePdfUnido) {
      const docU = new jsPDF({ unit: 'mm', format: 'a4' });
      const pw = 210, ph = 297;
      for (let j = 0; j < todas.length; j++) {
        if (j > 0) docU.addPage();
        const img = new Image();
        img.src = `data:image/png;base64,${todas[j].b64}`;
        await new Promise(r => img.onload = r);
        const scale = Math.min(pw / (img.naturalWidth/dpi*25.4), ph / (img.naturalHeight/dpi*25.4), 1);
        docU.addImage(todas[j].b64, 'PNG', 
          (pw - img.naturalWidth/dpi*25.4*scale)/2,
          (ph - img.naturalHeight/dpi*25.4*scale)/2,
          img.naturalWidth/dpi*25.4*scale,
          img.naturalHeight/dpi*25.4*scale);
      }
      target.file('PDF con imágenes centradas.pdf', docU.output('arraybuffer'));
    }

    logMsg(`✓ ${file.name} (${numPages} páginas)`);
  } catch (e) {
    logMsg(`❌ Error en ${file.name}: ${e.message}`, true);
  }
}

async function descargarZip(auto = false, parte = 1) {
  const nombre = `Expedientes-Procesados-parte-${parte}.zip`;
  try {
    const blob = await zipGlobal.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    saveAs(blob, nombre);
    logMsg(`✅ ${auto ? 'AUTO-DESCARGA' : 'DESCARGA'} → ${nombre}`);
  } catch (e) {
    logMsg('Error generando ZIP', true);
  }
}

function cropWhiteBorders(c) {
  const ctx = c.getContext('2d'), w = c.width, h = c.height;
  const d = ctx.getImageData(0,0,w,h).data;
  const isWhite = (r,g,b) => (r+g+b)/3 > 245;
  let top=0, bottom=h-1, left=0, right=w-1;
  while (top < bottom && rowIsWhite(top)) top++;
  while (bottom > top && rowIsWhite(bottom)) bottom--;
  while (left < right && colIsWhite(left)) left++;
  while (right > left && colIsWhite(right)) right--;
  const cw = right-left+1, ch = bottom-top+1;
  if (cw < w*0.08 || ch < h*0.08) return c;
  const nc = document.createElement('canvas');
  nc.width = cw; nc.height = ch;
  nc.getContext('2d').drawImage(c, left, top, cw, ch, 0, 0, cw, ch);
  return nc;
  function rowIsWhite(y) { for (let x=0; x<w; x++) { const i=(y*w+x)*4; if (!isWhite(d[i],d[i+1],d[i+2])) return false; } return true; }
  function colIsWhite(x) { for (let y=top; y<=bottom; y++) { const i=(y*w+x)*4; if (!isWhite(d[i],d[i+1],d[i+2])) return false; } return true; }
}

function analizarBlancos(c) {
  const d = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  let whitePixels = 0, total = c.width * c.height;
  for (let i=0; i<d.length; i+=4) {
    if ((d[i]+d[i+1]+d[i+2])/3 > 245) whitePixels++;
  }
  return { isMayor: (whitePixels / total) * 100 > 60 };
}

// PROCESAMIENTO PRINCIPAL
btnProcesar.addEventListener('click', async () => {
  const files = Array.from(input.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (files.length === 0) return;

  const parallel = parseInt(document.getElementById('parallelCount').value) || 3;
  const batchSize = parseInt(document.getElementById('batchSize').value) || 0;

  const config = {
    includeOriginal: document.getElementById('chkOriginal').checked,
    includeFotos: document.getElementById('chkMenor').checked,
    includeDocumentosImg: document.getElementById('chkMayorPng').checked,
    includePdfDocumentos: document.getElementById('chkMayorPdf').checked,
    includePdfUnido: document.getElementById('chkUnido').checked,
    format: document.querySelector('input[name="imgFormat"]:checked').value,
    jpegQuality: document.getElementById('jpegQuality').value / 100
  };

  logEl.innerHTML = '';
  zipGlobal = new JSZip();
  processedCount = 0;
  batchNumber = 1;

  const totalBatches = batchSize > 0 ? Math.ceil(files.length / batchSize) : 1;

  logMsg(`🚀 Iniciando procesamiento PARALELO (${parallel} PDFs simultáneos)`);
  if (batchSize > 0) logMsg(`📥 Descarga automática cada ${batchSize} PDFs`);

  document.getElementById('globalProgressContainer').classList.remove('hidden');
  document.getElementById('globalProgress').value = 0;
  batchProgressEl.classList.remove('hidden');
  totalBatchesEl.textContent = totalBatches;

  for (let i = 0; i < files.length; i += parallel) {
    const batch = files.slice(i, i + parallel);
    const currentBatchNum = batchSize > 0 ? Math.floor(processedCount / batchSize) + 1 : 1;

    currentBatchEl.textContent = currentBatchNum;
    batchRangeEl.textContent = `(${i+1}–${Math.min(i+parallel, files.length)} de ${files.length})`;

    document.getElementById('progress').innerHTML = `
      <span class="batch-info">Procesando lote ${currentBatchNum}...</span><br>
      <span class="text-lg text-slate-600">${batch.length} archivos simultáneos</span>
    `;

    await Promise.all(batch.map(file => processSinglePDF(file, config)));

    processedCount += batch.length;
    document.getElementById('globalProgress').value = Math.round((processedCount / files.length) * 100);

    // Descarga automática
    if (batchSize > 0 && processedCount % batchSize === 0) {
      await descargarZip(true, batchNumber);
      batchNumber++;
      zipGlobal = new JSZip();
    }
  }

  // Último lote
  if (batchSize === 0 || processedCount % batchSize !== 0) {
    await descargarZip(true, batchNumber);
  }

  document.getElementById('progress').innerHTML = `✅ ¡PROCESAMIENTO COMPLETADO!<br><span class="text-xl">${files.length} PDFs procesados</span>`;
  document.getElementById('downloadSection').classList.remove('hidden');
  btnProcesar.disabled = false;
});

document.getElementById('btnDescargar').addEventListener('click', () => descargarZip(false));

lucide.createIcons();
</script>
</body>
</html>
