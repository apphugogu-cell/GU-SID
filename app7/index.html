<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Procesador PDF - Ingeniería</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    :root {
      --primary: #1e40af;
      --primary-dark: #1e3a8a;
      --gray: #4b5563;
      --lightgray: #e5e7eb;
      --border: #d1d5db;
      --text: #111827;
      --bg: #f9fafb;
      --success: #047857;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:#111827; font-size:13.5px; line-height:1.35; padding:10px; }
    .container { max-width:860px; margin:0 auto; background:white; border:1px solid var(--border); border-radius:5px; overflow:hidden; }
    header { background:var(--primary); color:white; padding:10px 14px; text-align:center; font-weight:600; font-size:1.1rem; }
    .content { padding:12px; }
    h3 { font-size:1rem; margin:0 0 6px 0; color:var(--text); border-bottom:1px solid var(--lightgray); padding-bottom:3px; }
    .two-columns { display:flex; gap:12px; margin-bottom:10px; }
    .card { flex:1; padding:10px; border:1px solid var(--border); border-radius:4px; background:white; min-width:0; }
    .option { display:flex; align-items:center; gap:6px; padding:3px 0; font-size:0.92rem; }
    input[type="radio"], input[type="checkbox"] { width:14px; height:14px; accent-color:var(--primary); }
    .slider-container { display:flex; align-items:center; gap:8px; font-size:0.85rem; margin-top:5px; padding-left:20px; }
    input[type="range"] { flex:1; height:5px; accent-color:var(--primary); }
    input[type="file"] { font-size:0.92rem; padding:6px; border:1px dashed var(--border); border-radius:4px; width:100%; margin:6px 0; background:#f3f4f6; }
    button { font-size:0.92rem; padding:8px 20px; border:none; border-radius:4px; cursor:pointer; font-weight:500; margin:6px; }
    button.primary { background:var(--primary); color:white; }
    button.primary:hover { background:var(--primary-dark); }
    button.success { background:var(--success); color:white; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    #progress { text-align:center; font-size:1.05rem; font-weight:600; margin:16px 0; min-height:1.5em; }
    #progress.completed { color:var(--success); }
    .progress-container { margin:12px 0; display:none; }
    progress { width:100%; height:10px; background:#e5e7eb; border-radius:5px; }
    progress::-webkit-progress-value { background:var(--primary); border-radius:5px; }
    .log { font-family:'Consolas',monospace; font-size:0.82rem; line-height:1.3; background:#f3f4f6; border:1px solid var(--border); border-radius:4px; padding:10px; max-height:220px; overflow-y:auto; margin:12px 0; }
    .download-btns { text-align:center; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
    .download-btns button { min-width:220px; }
    @media (max-width:768px) { .two-columns { flex-direction:column; gap:12px; } button { width:100%; margin:8px 0; } }
  </style>
</head>
<body>

<div class="container">
  <header>Procesador PDF - GURALMO</header>

  <div class="content">

    <div class="two-columns">
      <div class="card">
        <h3>Formato imágenes</h3>
        <div class="option"><input type="radio" name="imgFormat" value="png" checked> PNG (calidad)</div>
        <div class="option"><input type="radio" name="imgFormat" value="jpeg"> JPEG (liviano)</div>
        <div id="jpegQualityRow" class="slider-container" style="display:none;">
          Calidad: <input type="range" id="jpegQuality" min="10" max="95" value="92" step="5">
          <span id="qualityValue">92%</span>
        </div>
      </div>

      <div class="card">
        <h3>Exportar</h3>
        <div class="option"><input type="checkbox" id="chkOriginal"> PDF original</div>
        <div class="option"><input type="checkbox" id="chkMenor" checked> Carpeta Fotos (Img.)</div>
        <div class="option"><input type="checkbox" id="chkMayorPng"> Carpeta Documentos (Img.)</div>
        <div class="option"><input type="checkbox" id="chkMayorPdf" checked> PDF Documentos</div>
        <div class="option"><input type="checkbox" id="chkUnido"> PDF con imágenes centradas</div>
      </div>
    </div>

    <div style="margin:16px 0; text-align:center;">
      <input type="file" id="pdfFiles" accept="application/pdf" multiple />
      <button id="btnProcesar" class="primary" disabled>Procesar</button>
    </div>

    <div id="progress">Seleccione archivo(s) PDF</div>

    <div id="globalProgressContainer" class="progress-container">
      <progress id="globalProgress" value="0" max="100"></progress>
    </div>

    <div class="log" id="log"></div>

    <div class="download-btns" id="downloadSection" style="display:none;">
      <button id="btnDescargar" class="success">Descargar ZIP procesado</button>
    </div>

  </div>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.worker.min.mjs';

const { jsPDF } = window.jspdf;

const input = document.getElementById('pdfFiles');
const btnProcesar = document.getElementById('btnProcesar');
const btnDescargar = document.getElementById('btnDescargar');
const progressEl = document.getElementById('progress');
const logEl = document.getElementById('log');
const globalProgressContainer = document.getElementById('globalProgressContainer');
const globalProgress = document.getElementById('globalProgress');
const downloadSection = document.getElementById('downloadSection');

const radiosFormat = document.querySelectorAll('input[name="imgFormat"]');
const jpegRow = document.getElementById('jpegQualityRow');
const jpegQualityInput = document.getElementById('jpegQuality');
const qualityValue = document.getElementById('qualityValue');

radiosFormat.forEach(radio => {
  radio.addEventListener('change', () => {
    jpegRow.style.display = radio.value === 'jpeg' ? 'flex' : 'none';
  });
});

jpegQualityInput.addEventListener('input', () => {
  qualityValue.textContent = jpegQualityInput.value + '%';
});

let zipGlobal = null;

function logMsg(msg, err = false) {
  const div = document.createElement('div');
  div.textContent = msg;
  div.style.color = err ? '#dc2626' : '#1e293b';
  if (err) div.style.fontWeight = 'bold';
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

input.addEventListener('change', () => {
  btnProcesar.disabled = input.files.length === 0;
  progressEl.textContent = input.files.length 
    ? `${input.files.length} PDF(s) seleccionado${input.files.length === 1 ? '' : 's'}`
    : 'Seleccione archivo(s) PDF';
});

btnProcesar.addEventListener('click', async () => {
  btnProcesar.disabled = true;
  progressEl.textContent = 'Calculando volumen y ajustando calidad...';
  logEl.innerHTML = '';
  zipGlobal = new JSZip();

  const files = Array.from(input.files);
  const totalFiles = files.length;

  // Estimación conservadora: 12 páginas por archivo
  const estimatedPages = totalFiles * 12;

  // Escala dinámica: NUNCA bajar de 2.0
  let renderScale = 3.0;
  if (estimatedPages > 5000) {
    renderScale = 2.0;  // mínimo absoluto
  } else if (estimatedPages > 3000) {
    renderScale = 2.1;
  } else if (estimatedPages > 2000) {
    renderScale = 2.2;
  } else if (estimatedPages > 1200) {
    renderScale = 2.3;
  } else if (estimatedPages > 600) {
    renderScale = 2.5;
  } else if (estimatedPages > 200) {
    renderScale = 2.8;
  } else {
    renderScale = 3.0;
  }

  logMsg(`Volumen: ${totalFiles} archivos (~${estimatedPages} páginas)`);
  logMsg(`→ Calidad ajustada: scale = ${renderScale.toFixed(1)}`);

  const selectedFormat = document.querySelector('input[name="imgFormat"]:checked')?.value || 'png';
  const jpegQualityVal = parseInt(jpegQualityInput.value) / 100;
  const jpegQuality = selectedFormat === 'jpeg' ? jpegQualityVal : 1.0;
  const includeOriginal = document.getElementById('chkOriginal').checked;
  const includeFotos = document.getElementById('chkMenor').checked;
  const includeDocumentosImg = document.getElementById('chkMayorPng').checked;
  const includePdfDocumentos = document.getElementById('chkMayorPdf').checked;
  const includePdfUnido = document.getElementById('chkUnido').checked;

  const onlyOneSpecialPDF = 
    (includePdfDocumentos || includePdfUnido) &&
    !(includePdfDocumentos && includePdfUnido) &&
    !includeOriginal && !includeFotos && !includeDocumentosImg;

  globalProgressContainer.style.display = 'block';
  globalProgress.value = 0;

  for (let i = 0; i < totalFiles; i++) {
    const file = files[i];
    const baseName = file.name.replace(/\.pdf$/i, '');

    progressEl.textContent = `Procesando archivo ${i+1}/${totalFiles} (${file.name})`;

    try {
      logMsg(`Procesando (${i+1}/${totalFiles}): ${file.name}`);

      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: ab}).promise;
      const numPages = pdf.numPages;

      const target = onlyOneSpecialPDF ? zipGlobal : zipGlobal.folder(baseName);

      const fotosFolder = includeFotos && !onlyOneSpecialPDF ? target.folder('Fotos') : null;
      const docsFolder = includeDocumentosImg && !onlyOneSpecialPDF ? target.folder('Documentos') : null;
      const whites = [];
      const todas = [];

      const mime = selectedFormat === 'jpeg' ? 'image/jpeg' : 'image/png';
      const ext = selectedFormat === 'jpeg' ? 'jpg' : 'png';

      for (let p = 1; p <= numPages; p++) {
        const page = await pdf.getPage(p);
        const vp = page.getViewport({scale: renderScale});
        const canvas = document.createElement('canvas');
        canvas.width = vp.width;
        canvas.height = vp.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;

        const cropped = cropWhiteBorders(canvas);
        const {isMayor} = analizarBlancos(cropped);

        const b64 = cropped.toDataURL(mime, jpegQuality).split(',')[1];

        todas.push({b64, format: selectedFormat});

        if (isMayor) {
          if (docsFolder) docsFolder.file(`p-${p.toString().padStart(3,'0')}.${ext}`, b64, {base64: true});
          whites.push(b64);
        } else {
          if (fotosFolder) fotosFolder.file(`p-${p.toString().padStart(3,'0')}.${ext}`, b64, {base64: true});
        }
      }

      const dpi = 200;

      if (whites.length > 0 && includePdfDocumentos) {
        try {
          let img = new Image();
          img.src = `data:image/png;base64,${whites[0]}`;
          await new Promise(r => img.onload = r);

          let wMm = (img.naturalWidth / dpi) * 25.4;
          let hMm = (img.naturalHeight / dpi) * 25.4;

          const doc = new jsPDF({
            unit: 'mm',
            format: [wMm, hMm],
            orientation: wMm > hMm ? 'landscape' : 'portrait'
          });

          doc.addImage(whites[0], 'PNG', 0, 0, wMm, hMm, null, 'FAST');

          for (let j = 1; j < whites.length; j++) {
            img = new Image();
            img.src = `data:image/png;base64,${whites[j]}`;
            await new Promise(r => img.onload = r);

            wMm = (img.naturalWidth / dpi) * 25.4;
            hMm = (img.naturalHeight / dpi) * 25.4;

            doc.addPage([wMm, hMm], wMm > hMm ? 'landscape' : 'portrait');
            doc.addImage(whites[j], 'PNG', 0, 0, wMm, hMm, null, 'FAST');
          }

          const pdfName = onlyOneSpecialPDF 
            ? `${baseName} - Documentos.pdf`
            : 'PDF de Documentos.pdf';

          target.file(pdfName, doc.output('arraybuffer').slice(0));
          logMsg(`→ ${pdfName} (${whites.length} pág)`);
        } catch (e) {
          logMsg(`Error PDF Documentos: ${e.message}`, true);
        }
      }

      if (todas.length > 0 && includePdfUnido) {
        try {
          const docU = new jsPDF({unit:'mm', format:'a4'});
          const pw = 210, ph = 297;

          for (let j = 0; j < todas.length; j++) {
            if (j > 0) docU.addPage();
            const {b64} = todas[j];
            const img = new Image();
            img.src = `data:image/png;base64,${b64}`;
            await new Promise(r => img.onload = r);

            const iw = img.naturalWidth, ih = img.naturalHeight;
            const wMm = (iw / dpi) * 25.4;
            const hMm = (ih / dpi) * 25.4;

            const scale = Math.min(pw / wMm, ph / hMm, 1);
            const fw = wMm * scale;
            const fh = hMm * scale;
            const x = (pw - fw) / 2;
            const y = (ph - fh) / 2;

            docU.addImage(b64, 'PNG', x, y, fw, fh, null, 'FAST');
          }

          const pdfName = onlyOneSpecialPDF 
            ? `${baseName} - Imágenes centradas.pdf`
            : 'PDF con imágenes centradas.pdf';

          target.file(pdfName, docU.output('arraybuffer').slice(0));
          logMsg(`→ ${pdfName} (${todas.length} pág)`);
        } catch (e) {
          logMsg(`Error PDF con imágenes centradas: ${e.message}`, true);
        }
      }

    } catch (e) {
      logMsg(`Error ${file.name}: ${e.message}`, true);
    }

    const percent = Math.round(((i + 1) / totalFiles) * 100);
    globalProgress.value = percent;
  }

  globalProgressContainer.style.display = 'none';
  progressEl.textContent = 'Completado';
  progressEl.classList.add('completed');
  downloadSection.style.display = 'block';
  btnProcesar.disabled = false;
});

btnDescargar.addEventListener('click', async () => {
  if (!zipGlobal) {
    logMsg('No hay datos para descargar', true);
    return;
  }

  progressEl.textContent = 'Creando ZIP...';
  btnDescargar.disabled = true;

  const tempZip = new JSZip();

  try {
    for (const path in zipGlobal.files) {
      const f = zipGlobal.files[path];
      if (f.dir) continue;

      let content;

      if (f._data && f._data.uncompressed) {
        content = f._data.uncompressed.slice(0);
      } else {
        content = await f.async('arraybuffer');
        content = content.slice(0);
      }

      tempZip.file(path, content);
    }

    const blob = await tempZip.generateAsync({
      type: 'blob',
      compression: 'DEFLATE',
      compressionOptions: { level: 6 }
    });

    const name = input.files.length === 1 
      ? `${input.files[0].name.replace(/\.pdf$/i,'')} - procesado.zip`
      : 'pdfs-procesados.zip';

    saveAs(blob, name);
    progressEl.textContent = 'Descargado ✓';
    logMsg('Archivo ZIP generado correctamente');
  } catch (e) {
    progressEl.textContent = 'Error al crear ZIP';
    logMsg(`Error en ZIP: ${e.message}`, true);
  }

  btnDescargar.disabled = false;
});

function cropWhiteBorders(c) {
  const ctx = c.getContext('2d'), w = c.width, h = c.height;
  const d = ctx.getImageData(0,0,w,h).data;
  const isWhite = (r,g,b) => (r+g+b)/3 > 245;

  let top=0, bottom=h-1, left=0, right=w-1;
  while (top < bottom && rowIsWhite(top)) top++;
  while (bottom > top && rowIsWhite(bottom)) bottom--;
  while (left < right && colIsWhite(left)) left++;
  while (right > left && colIsWhite(right)) right--;

  const cw = right-left+1, ch = bottom-top+1;
  if (cw < w*0.08 || ch < h*0.08) return c;

  const nc = document.createElement('canvas');
  nc.width = cw; nc.height = ch;
  nc.getContext('2d').drawImage(c, left, top, cw, ch, 0, 0, cw, ch);
  return nc;

  function rowIsWhite(y) { for (let x=0; x<w; x++) { const i=(y*w+x)*4; if (!isWhite(d[i],d[i+1],d[i+2])) return false; } return true; }
  function colIsWhite(x) { for (let y=top; y<=bottom; y++) { const i=(y*w+x)*4; if (!isWhite(d[i],d[i+1],d[i+2])) return false; } return true; }
}

function analizarBlancos(c) {
  const d = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  let whitePixels = 0, total = c.width * c.height;
  for (let i=0; i<d.length; i+=4) {
    if ((d[i]+d[i+1]+d[i+2])/3 > 245) whitePixels++;
  }
  return { isMayor: (whitePixels / total) * 100 > 60 };
}
</script>
</body>
</html>
