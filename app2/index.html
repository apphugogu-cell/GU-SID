<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminador Masivo de Fotos - 20 Columnas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { margin: 5px 0 20px; color: #555; }

        #controls { margin: 30px 0; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #pick-folder {
            background: #007bff;
            color: white;
            font-size: 18px;
            padding: 15px 30px;
        }
        #delete-selected {
            background: #dc3545;
            color: white;
            font-size: 18px;
            padding: 15px 30px;
            display: none;
        }
        #delete-selected.visible { display: inline-block; }

        #pagination {
            margin: 30px 0;
            font-size: 18px;
        }
        #pagination button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
        }
        #pagination button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        #items-per-page {
            padding: 8px;
            font-size: 16px;
            margin: 0 20px;
        }

        /* GALERÍA CON HASTA 20 COLUMNAS */
        #gallery {
            display: grid;
            grid-template-columns: repeat(20, 1fr); /* 20 columnas en pantallas muy grandes */
            gap: 10px;
            margin: 20px auto;
            max-width: 100%;
            padding: 0 5px;
        }

        /* Adaptación progresiva a pantallas más pequeñas */
        @media (max-width: 2200px) { #gallery { grid-template-columns: repeat(18, 1fr); } }
        @media (max-width: 2000px) { #gallery { grid-template-columns: repeat(16, 1fr); } }
        @media (max-width: 1800px) { #gallery { grid-template-columns: repeat(15, 1fr); } }
        @media (max-width: 1600px) { #gallery { grid-template-columns: repeat(14, 1fr); } }
        @media (max-width: 1400px) { #gallery { grid-template-columns: repeat(12, 1fr); } }
        @media (max-width: 1200px) { #gallery { grid-template-columns: repeat(10, 1fr); } }
        @media (max-width: 1000px) { #gallery { grid-template-columns: repeat(8, 1fr); } }
        @media (max-width: 900px)  { #gallery { grid-template-columns: repeat(7, 1fr); } }
        @media (max-width: 800px)  { #gallery { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 700px)  { #gallery { grid-template-columns: repeat(5, 1fr); } }
        @media (max-width: 600px)  { #gallery { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 500px)  { #gallery { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 400px)  { #gallery { grid-template-columns: repeat(2, 1fr); } }

        .image-item {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px;
            background: white;
            box-shadow: 0 1px 5px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .image-item img {
            max-width: 100%;
            max-height: 140px; /* Más pequeño para caber 20 columnas */
            border-radius: 4px;
            object-fit: cover;
            flex-grow: 1;
        }
        .image-item p {
            margin: 6px 0 2px;
            font-weight: bold;
            word-break: break-all;
            font-size: 0.7em;
            line-height: 1.2;
            max-height: 2.4em;
            overflow: hidden;
        }
        .checkbox {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            z-index: 10;
        }
        .image-item.selected {
            border: 3px solid #dc3545;
            box-shadow: 0 0 10px rgba(220,53,69,0.8);
        }

        .add-area {
            grid-column: 1 / -1;
            border: 3px dashed #007bff;
            border-radius: 10px;
            padding: 30px;
            background: #e8f4ff;
            font-size: 1.2em;
            color: #007bff;
            cursor: pointer;
        }
        .add-area.dragover {
            background: #b3e0ff;
            border-style: solid;
        }

        #status {
            font-weight: bold;
            margin: 20px;
            min-height: 24px;
            font-size: 1.1em;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Eliminador Masivo de Fotografías</h1>
    <p>Hasta 20 fotos por fila • Ideal para limpieza rápida de grandes carpetas</p>

    <div id="controls">
        <button id="pick-folder">Seleccionar Carpeta con Fotos</button>
        <button id="delete-selected">ELIMINAR SELECCIONADAS (0)</button>
    </div>

    <div id="pagination" style="display:none;">
        <button id="prev-page">← Anterior</button>
        <span id="page-info"></span>
        <button id="next-page">Siguiente →</button>
        <label>
            Mostrar:
            <select id="items-per-page">
                <option value="25">25</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
                <option value="99999">Todas</option>
            </select>
            por página
        </label>
    </div>

    <div id="status"></div>

    <div id="gallery"></div>

    <script>
        const pickBtn = document.getElementById('pick-folder');
        const deleteBtn = document.getElementById('delete-selected');
        const status = document.getElementById('status');
        const gallery = document.getElementById('gallery');
        const pagination = document.getElementById('pagination');
        const prevBtn = document.getElementById('prev-page');
        const nextBtn = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');
        const itemsPerPageSelect = document.getElementById('items-per-page');

        let dirHandle = null;
        let allImages = [];
        let selected = new Set();
        let currentPage = 1;
        let itemsPerPage = 50;

        prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderPage(); } };
        nextBtn.onclick = () => { if (currentPage < totalPages()) { currentPage++; renderPage(); } };
        itemsPerPageSelect.onchange = () => {
            itemsPerPage = parseInt(itemsPerPageSelect.value);
            currentPage = 1;
            renderPage();
        };

        function totalPages() {
            return Math.ceil(allImages.length / itemsPerPage);
        }

        function renderPage() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageImages = allImages.slice(start, end);

            gallery.innerHTML = '';

            pageImages.forEach(item => {
                const div = document.createElement('div');
                div.className = 'image-item';
                if (selected.has(item.fileHandle)) div.classList.add('selected');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'checkbox';
                checkbox.checked = selected.has(item.fileHandle);
                checkbox.onchange = () => toggleSelect(item.fileHandle, div);

                const url = URL.createObjectURL(item.file);
                const img = document.createElement('img');
                img.src = url;

                const p = document.createElement('p');
                p.textContent = item.name;

                div.appendChild(checkbox);
                div.appendChild(img);
                div.appendChild(p);
                div.onclick = (e) => {
                    if (e.target !== checkbox) {
                        checkbox.checked = !checkbox.checked;
                        checkbox.dispatchEvent(new Event('change'));
                    }
                };

                gallery.appendChild(div);
            });

            const addArea = document.createElement('div');
            addArea.className = 'add-area';
            addArea.innerHTML = `<strong>+</strong><br>Arrastra fotos aquí<br>o pega (Ctrl+V)<br>o haz clic`;
            addArea.onclick = () => triggerFileInput();
            addArea.ondragover = e => { e.preventDefault(); addArea.classList.add('dragover'); };
            addArea.ondragleave = () => addArea.classList.remove('dragover');
            addArea.ondrop = e => { e.preventDefault(); addArea.classList.remove('dragover'); handleDrop(e.dataTransfer.files); };
            gallery.appendChild(addArea);

            pageInfo.textContent = `Página ${currentPage} de ${totalPages()} (${allImages.length} imágenes totales)`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages();
            updateDeleteButton();
        }

        function toggleSelect(fileHandle, element) {
            if (selected.has(fileHandle)) {
                selected.delete(fileHandle);
                element.classList.remove('selected');
            } else {
                selected.add(fileHandle);
                element.classList.add('selected');
            }
            updateDeleteButton();
        }

        function updateDeleteButton() {
            deleteBtn.textContent = `ELIMINAR SELECCIONADAS (${selected.size})`;
            deleteBtn.classList.toggle('visible', selected.size > 0);
        }

        deleteBtn.onclick = async () => {
            if (selected.size === 0) return;
            if (!confirm(`¿Eliminar permanentemente ${selected.size} imágenes? Esta acción no se puede deshacer.`)) return;

            deleteBtn.disabled = true;
            status.textContent = `Eliminando ${selected.size} imágenes...`;

            let deleted = 0;
            for (const handle of selected) {
                try {
                    const parentDir = await getParentDirectoryHandle(handle);
                    if (parentDir) {
                        await parentDir.removeEntry(handle.name);
                        deleted++;
                    }
                } catch (err) {
                    console.error(err);
                }
            }

            selected.clear();
            await loadAllImages();
            status.textContent = `¡Eliminadas ${deleted} imágenes correctamente!`;
            setTimeout(() => status.textContent = '', 5000);
            deleteBtn.disabled = false;
        };

        async function getParentDirectoryHandle(fileHandle) {
            async function search(dir, targetName) {
                for await (const entry of dir.values()) {
                    if (entry.kind === 'file' && entry.name === targetName) {
                        return dir;
                    }
                    if (entry.kind === 'directory') {
                        const found = await search(entry, targetName);
                        if (found) return found;
                    }
                }
                return null;
            }
            return await search(dirHandle, fileHandle.name);
        }

        async function loadAllImages() {
            allImages = [];
            await collectImages(dirHandle, '');
            allImages.sort((a, b) => a.path.localeCompare(b.path));
            currentPage = 1;
            renderPage();
            pagination.style.display = allImages.length > 0 ? 'block' : 'none';
        }

        async function collectImages(handle, path) {
            for await (const entry of handle.values()) {
                const fullPath = path ? `${path}/${entry.name}` : entry.name;
                if (entry.kind === 'file' && entry.name.match(/\.(jpg|jpeg|png|gif|webp|bmp|avif)$/i)) {
                    const file = await entry.getFile();
                    allImages.push({
                        fileHandle: entry,
                        file,
                        name: entry.name,
                        path: fullPath
                    });
                } else if (entry.kind === 'directory') {
                    await collectImages(entry, fullPath);
                }
            }
        }

        pickBtn.onclick = async () => {
            try {
                dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                status.textContent = 'Cargando todas las imágenes de la carpeta y subcarpetas...';
                selected.clear();
                await loadAllImages();
                status.textContent = `¡Listo! Se encontraron ${allImages.length} imágenes.`;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    alert('Error: ' + err.message);
                }
            }
        };

        function triggerFileInput() {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = 'image/*';
            input.onchange = e => handleDrop(e.target.files);
            input.click();
        }

        async function handleDrop(files) {
            if (!dirHandle) return;
            let added = 0;
            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    try {
                        let name = file.name;
                        let counter = 1;
                        while (true) {
                            try {
                                await dirHandle.getFileHandle(name);
                                const ext = name.split('.').pop();
                                const base = name.slice(0, -(ext.length + 1));
                                name = `${base} (${counter}).${ext}`;
                                counter++;
                            } catch { break; }
                        }
                        const handle = await dirHandle.getFileHandle(name, { create: true });
                        const writable = await handle.createWritable();
                        await writable.write(file);
                        await writable.close();
                        added++;
                    } catch (err) { console.error(err); }
                }
            }
            if (added > 0) {
                await loadAllImages();
                status.textContent = `Se añadieron ${added} nuevas imágenes.`;
                setTimeout(() => status.textContent = '', 4000);
            }
        }

        document.addEventListener('paste', e => {
            if (e.clipboardData.files.length > 0) {
                handleDrop(e.clipboardData.files);
            }
        });
    </script>
</body>
</html>
